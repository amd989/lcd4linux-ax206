# Theme design: @takattila (turing-smart-screen-python)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
# SimpleWhiteNasIO — 4-bay NAS drive monitor with I/O sparklines
# Each section shows one drive: usage %, used/total, and I/O throughput sparkline
#
# IMPORTANT: Adjust the drive variables below to match your NAS drives.
#
# I/O measurement uses /sys/block/<dev>/stat to compute read+write sectors
# per sample interval, stored in /tmp/lcd_io_<dev> for delta calculation.
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 3
    Backlight  backlight
}

# ---------------------------------------------------------------
# SimpleWhiteNasIO theme — 320x480 portrait
#
# COORDINATE MAPPING for portrait mode (Orientation 3):
#   Layout X<n> = vertical position (row), top=1 to bottom=480
#   Layout Y<n> = horizontal position (col), left=1 to right=320
#
# TTF widgets: MUST set both width AND height for proper centering
#   and alignment.  Set reload 1 for dynamic expressions.
# ---------------------------------------------------------------

# Background image
Widget Background {
    class 'Image'
    file 'themes/SimpleWhite/background.png'
    reload 0
    update 0
    visible 1
}

# ---------------------------------------------------------------
# Section 1: Drive 1 (rows 0-119)
# ---------------------------------------------------------------

# Big usage % number
Widget Drive1_TTF {
    class 'Truetype'
    expression exec('df --output=pcent ' . drive1_part . ' 2>/dev/null | tail -1 | tr -dc 0-9', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update 60000
}

# "% LABEL" label
Widget Drive1_Label_TTF {
    class 'Truetype'
    expression '%  ' . drive1_name
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}

# Used/total — small text, right-aligned
Widget Drive1_Size_TTF {
    class 'Truetype'
    expression exec('df -h --output=used,size ' . drive1_part . ' 2>/dev/null | tail -1 | xargs | sed "s# #/#"', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 10
    align 'R'
    width 90
    height 16
    reload 1
    update 60000
}

# Temperature number (left-aligned, next to size)
Widget Drive1_Temp_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/block/' . drive1_blk . '/device/hwmon/hwmon*/temp1_input 2>/dev/null', 5000) / 1000, 0) . '°C'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 10
    align 'L'
    width 50
    height 16
    reload 1
    update 5000
}

# I/O throughput overlay (transparent, bottom-right of sparkline)
Widget Drive1_IO_TTF {
    class 'Truetype'
    expression precision(exec('f=/tmp/lcd_io_' . drive1_blk . '; set -- $(cat /sys/block/' . drive1_blk . '/stat); c=$(($3+$7)); if [ -f $f ] && [ $(($(date +%s)-$(stat -c %Y $f))) -lt 15 ]; then p=$(cat $f); else p=$c; fi; echo $c > $f; echo $((c-p))', 5000) * 512 / 1024 / 1024 / 5, 1) . ' M/s'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    background '00000000'
    size 10
    align 'R'
    width 70
    height 16
    reload 1
    update 5000
}

# I/O sparkline (read+write sectors delta, auto-scaled)
Widget Drive1_Spark {
    class 'sparkline'
    expression exec('f=/tmp/lcd_io_' . drive1_blk . '; set -- $(cat /sys/block/' . drive1_blk . '/stat); c=$(($3+$7)); if [ -f $f ] && [ $(($(date +%s)-$(stat -c %Y $f))) -lt 15 ]; then p=$(cat $f); else p=$c; fi; echo $c > $f; echo $((c-p))', 5000)
    color '00aaff'
    background '000000'
    length 140
    width 50
    update 5000
}

