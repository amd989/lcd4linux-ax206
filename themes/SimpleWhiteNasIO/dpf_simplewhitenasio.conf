# ---------------------------------------------------------------
Display 'DPF'
# Enable for mirroring to VNC (e.g., for remote monitoring or debugging)
# Mirror  'VNC'

# Display VNC {
#     Driver       'VNC'
#     Font         '6x8'
#     Port         '5900'
#     Xres         '320'
#     Yres         '480'
#     Bpp          '4'
#     Maxclients   '2'
#     Osd_showtime '2000'
# }

Layout layout_simplewhitenasio {
    # Layer 0: I/O overlays (topmost, transparent background over sparklines)
    Layer 0 {
        X99.Y241   'Drive1_IO_TTF'
        X214.Y241  'Drive2_IO_TTF'
        X334.Y241  'Drive3_IO_TTF'
        X451.Y241  'Drive4_IO_TTF'
    }

    Layer 1 {
        # --- Section 1: Drive 1 (rows 0-119) ---
        X16.Y6     'Drive1_TTF'
        X11.Y171   'Drive1_Label_TTF'
        X47.Y171   'Drive1_Temp_TTF'
        X47.Y221   'Drive1_Size_TTF'
        X65.Y171   'Drive1_Spark'

        # --- Section 2: Drive 2 (rows 120-239) ---
        X131.Y6    'Drive2_TTF'
        X126.Y171  'Drive2_Label_TTF'
        X162.Y171  'Drive2_Temp_TTF'
        X162.Y221  'Drive2_Size_TTF'
        X180.Y171  'Drive2_Spark'

        # --- Section 3: Drive 3 (rows 240-359) ---
        X251.Y6    'Drive3_TTF'
        X246.Y171  'Drive3_Label_TTF'
        X282.Y171  'Drive3_Temp_TTF'
        X282.Y221  'Drive3_Size_TTF'
        X300.Y171  'Drive3_Spark'

        # --- Section 4: Drive 4 (rows 360-479) ---
        X371.Y6    'Drive4_TTF'
        X363.Y171  'Drive4_Label_TTF'
        X399.Y171  'Drive4_Temp_TTF'
        X399.Y221  'Drive4_Size_TTF'
        X417.Y171  'Drive4_Spark'
    }

    Layer 2 {
        X1.Y1 'Background'
    }
}

Layout 'layout_simplewhitenasio'

# ---------------------------------------------------------------
# Drive configuration — change these to match your NAS
#   drive<N>_part  = partition path for df (e.g., '/dev/sda2')
#                    Supports /dev/disk/by-id/ paths for stable naming
#                    across reboots (e.g., '/dev/disk/by-id/ata-WDC_...-part1')
#   drive<N>_blk   = block device name for I/O stats (e.g., 'sda')
#   drive<N>_name  = display label (e.g., 'SDA')
# ---------------------------------------------------------------
Variables {
    backlight 7
    tick 1000
    tack 500

    drive1_part '/dev/sdb1'
    drive1_blk  'sdb'
    drive1_name 'HD1'

    drive2_part '/dev/sdc2'
    drive2_blk  'sdc'
    drive2_name 'HD2'

    drive3_part '/dev/sdd1'
    drive3_blk  'sdd'
    drive3_name 'HD3'

    drive4_part '/dev/sde1'
    drive4_blk  'sde'
    drive4_name 'HD4'
}
