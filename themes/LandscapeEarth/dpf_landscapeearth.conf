# Theme design: @mathoudebine (turing-smart-screen-python)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 0
    Backlight  backlight
}

# ---------------------------------------------------------------
# LandscapeEarth theme — 480x320 landscape
# Clean system monitor with Earth background
#
# Colors: Cyan 42cfef (bars), White ffffff (text)
#
# COORDINATE MAPPING for landscape (Orientation 0):
#   Layout X{n} = theme_Y  (vertical position)
#   Layout Y{n} = theme_X  (horizontal position)
# ---------------------------------------------------------------

Widget Background {
    class 'Image'
    file 'themes/LandscapeEarth/background.png'
    reload 0
    update 0
    visible 1
}

# ---------------------------------------------------------------
# Clock (top-left)
# ---------------------------------------------------------------

Widget Clock_TTF {
    class 'Truetype'
    expression exec('date +"%l:%M %p"', 1000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 16
    align 'L'
    width 115
    height 30
    reload 1
    update 1000
}

# ---------------------------------------------------------------
# Date (below clock)
# ---------------------------------------------------------------

Widget Date_TTF {
    class 'Truetype'
    expression exec('date +"%b %e, %Y" | tr "[:lower:]" "[:upper:]"', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'fcffff'
    size 16
    align 'L'
    width 180
    height 24
    reload 1
    update 60000
}

# ---------------------------------------------------------------
# CPU Temperature
# ---------------------------------------------------------------

Widget CPU_Temp_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp', 5000) / 1000, 0).'°C'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 15
    align 'R'
    width 60
    height 22
    reload 1
    update 5000
}

# ---------------------------------------------------------------
# CPU Usage: percentage text + bar
# ---------------------------------------------------------------

Widget CPU_Pct_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 15
    align 'R'
    width 36
    height 22
    reload 1
    update tick
}

Widget CPU_Bar {
    class 'GraphicBar'
    expression proc_stat::cpu('busy', 500)
    color '42cfef'
    background '1a2a3a'
    max 100
    length 140
    width 14
    direction 'E'
    update tack
}

# ---------------------------------------------------------------
# GPU Usage: percentage text + bar (Intel iGPU via sysfs)
# ---------------------------------------------------------------

Widget GPU_Pct_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/drm/card0/gt/gt0/rps_act_freq_mhz 2>/dev/null || echo 0', 1000) / exec('cat /sys/class/drm/card0/gt/gt0/rps_max_freq_mhz 2>/dev/null || echo 1050', 5000) * 100, 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 15
    align 'R'
    width 36
    height 22
    reload 1
    update tick
}

Widget GPU_Bar {
    class 'GraphicBar'
    expression exec('cat /sys/class/drm/card0/gt/gt0/rps_act_freq_mhz 2>/dev/null || echo 0', 1000) / exec('cat /sys/class/drm/card0/gt/gt0/rps_max_freq_mhz 2>/dev/null || echo 1050', 5000) * 100
    color '42cfef'
    background '1a2a3a'
    max 100
    length 140
    width 14
    direction 'E'
    update tack
}

# ---------------------------------------------------------------
# RAM Usage: percentage text + bar
# ---------------------------------------------------------------

Widget RAM_Pct_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100, 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 15
    align 'R'
    width 36
    height 22
    reload 1
    update tick
}

Widget RAM_Bar {
    class 'GraphicBar'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    color '42cfef'
    background '1a2a3a'
    max 100
    length 140
    width 14
    direction 'E'
    update tack
}

# ---------------------------------------------------------------
# CPU Frequency (bottom)
# ---------------------------------------------------------------

Widget CPU_Freq_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq', 60000) / 1000000, 2).' GHZ'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 13
    align 'L'
    width 120
    height 20
    reload 1
    update 60000
}

# ---------------------------------------------------------------
Display 'DPF'

Layout layout_earth {
    Layer 1 {
        # Clock + Date
        X27.Y15     'Clock_TTF'
        X65.Y15     'Date_TTF'

        # CPU Temp
        X99.Y111    'CPU_Temp_TTF'

        # CPU Usage
        X138.Y121   'CPU_Pct_TTF'
        X161.Y15    'CPU_Bar'

        # GPU Usage
        X184.Y121   'GPU_Pct_TTF'
        X207.Y15    'GPU_Bar'

        # RAM Usage
        X228.Y121   'RAM_Pct_TTF'
        X251.Y15    'RAM_Bar'

        # CPU Frequency
        X278.Y49    'CPU_Freq_TTF'
    }

    Layer 2 {
        X1.Y1 'Background'
    }
}

Layout 'layout_earth'

Variables {
    backlight 7
    tick 1000
    tack 500
}
