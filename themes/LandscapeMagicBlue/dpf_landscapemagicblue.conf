# Theme design: @mathoudebine (turing-smart-screen-python)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 0
    Backlight  backlight
}

# ---------------------------------------------------------------
# LandscapeMagicBlue theme — 480x320 landscape
# Sci-fi dashboard with 4 radial gauges (CPU, GPU, RAM, GPU RAM),
# network speeds, disk usage, date/clock
#
# Colors: Pink ff00ad (gauges), Cyan 80ffff (text values),
#         Teal 10dfef (labels in bg), Cyan 52ffff (bars)
#
# Gauge angles: All radials use ANGLE_START=120, ANGLE_END=60, CW
#   GD_start = 450 - 120 = 330, direction flipped → CCW, sweep = 300
#
# COORDINATE MAPPING for landscape (Orientation 0):
#   Layout X{n} = theme_Y  (vertical position)
#   Layout Y{n} = theme_X  (horizontal position)
# ---------------------------------------------------------------

Widget Background {
    class 'Image'
    file 'themes/LandscapeMagicBlue/background.png'
    reload 0
    update 0
    visible 1
}

# ---------------------------------------------------------------
# Top bar: Date + Clock
# ---------------------------------------------------------------

Widget Date_TTF {
    class 'Truetype'
    expression exec('date +"%b %e, %Y" | tr "[:lower:]" "[:upper:]"', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    size 9
    align 'C'
    width 110
    height 16
    reload 1
    update 60000
}

Widget Clock_TTF {
    class 'Truetype'
    expression exec('date +"%l:%M:%S %p"', 1000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    size 10
    align 'C'
    width 100
    height 16
    reload 1
    update 1000
}

# ---------------------------------------------------------------
# Network (top-left area)
# ---------------------------------------------------------------

Widget NET_UL_TTF {
    class 'Truetype'
    expression (netdev(eth_if, 'Tx_bytes', 1000) / 1024 >= 1000) ? precision(netdev(eth_if, 'Tx_bytes', 1000) / 1024 / 1024, 1).' M/S' : precision(netdev(eth_if, 'Tx_bytes', 1000) / 1024, 1).' K/S'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    size 12
    align 'L'
    width 120
    height 18
    reload 1
    update tick
}

Widget NET_DL_TTF {
    class 'Truetype'
    expression (netdev(eth_if, 'Rx_bytes', 1000) / 1024 >= 1000) ? precision(netdev(eth_if, 'Rx_bytes', 1000) / 1024 / 1024, 1).' M/S' : precision(netdev(eth_if, 'Rx_bytes', 1000) / 1024, 1).' K/S'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    size 12
    align 'L'
    width 120
    height 18
    reload 1
    update tick
}

# ---------------------------------------------------------------
# Disk (top-right area)
# ---------------------------------------------------------------

Widget Disk_Label_TTF {
    class 'Truetype'
    expression 'DISK'
    font 'fonts/roboto/Roboto-Bold.ttf'
    fcolor '10dfef'
    size 14
    align 'C'
    width 50
    height 20
    update 0
}

Widget Disk_Used_Label_TTF {
    class 'Truetype'
    expression 'Used:'
    font 'fonts/roboto/Roboto-Regular.ttf'
    fcolor '10dfef'
    size 13
    align 'L'
    width 50
    height 18
    update 0
}

Widget Disk_Used_TTF {
    class 'Truetype'
    expression precision((statfs('/', 'blocks') - statfs('/', 'bavail')) * statfs('/', 'bsize') / 1073741824, 0).' G'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    size 13
    align 'R'
    width 80
    height 18
    reload 1
    update 10000
}

Widget Disk_Bar {
    class 'GraphicBar'
    expression (1 - 1.0 * statfs('/', 'bavail') / statfs('/', 'blocks')) * 100
    color '52ffff'
    background '081442'
    max 100
    length 110
    width 7
    direction 'E'
    update 10000
}

# ---------------------------------------------------------------
# CPU Gauge (center-left, large)
# Center: theme X=241, Y=154, radius=52 → 104x104
# ---------------------------------------------------------------

Widget CPU_Gauge {
    class 'Gauge'
    expression proc_stat::cpu('busy', 500)
    width 104
    height 104
    min 0
    max 100
    start 330
    sweep 300
    thickness 5
    color 'ff00ad'
    background '000000ff'
    update tack
    direction 'CCW'
}

Widget CPU_Pct_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff00ad'
    background '00000000'
    size 18
    align 'C'
    width 104
    height 26
    reload 1
    update tick
}

Widget CPU_Freq_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq', 60000) / 1000000, 2)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    size 13
    align 'L'
    width 60
    height 18
    reload 1
    update 5000
}

Widget CPU_Temp_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp', 5000) / 1000, 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    size 12
    align 'L'
    width 40
    height 18
    reload 1
    update 5000
}

# ---------------------------------------------------------------
# GPU Gauge (center-right, medium)
# Center: theme X=366, Y=155, radius=35 → 70x70
# ---------------------------------------------------------------

Widget GPU_Gauge {
    class 'Gauge'
    expression exec('cat /sys/class/drm/card0/gt/gt0/rps_act_freq_mhz 2>/dev/null || echo 0', 1000) / exec('cat /sys/class/drm/card0/gt/gt0/rps_max_freq_mhz 2>/dev/null || echo 1050', 5000) * 100
    width 70
    height 70
    min 0
    max 100
    start 330
    sweep 300
    thickness 7
    color 'ff00ad'
    background '000000ff'
    update tack
    direction 'CCW'
}

Widget GPU_Pct_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/drm/card0/gt/gt0/rps_act_freq_mhz 2>/dev/null || echo 0', 1000) / exec('cat /sys/class/drm/card0/gt/gt0/rps_max_freq_mhz 2>/dev/null || echo 1050', 5000) * 100, 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    background '00000000'
    size 13
    align 'C'
    width 70
    height 18
    reload 1
    update tick
}

Widget GPU_Temp_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/hwmon/hwmon1/temp1_input 2>/dev/null || echo 0', 5000) / 1000, 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    size 12
    align 'L'
    width 40
    height 18
    reload 1
    update 5000
}

# ---------------------------------------------------------------
# RAM Gauge (bottom-left, small)
# Center: theme X=136, Y=250, radius=31 → 62x62
# ---------------------------------------------------------------

Widget RAM_Gauge {
    class 'Gauge'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    width 62
    height 62
    min 0
    max 100
    start 330
    sweep 300
    thickness 5
    color 'ff00ad'
    background '000000ff'
    update tack
    direction 'CCW'
}

Widget RAM_Pct_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100, 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    background '00000000'
    size 11
    align 'C'
    width 62
    height 16
    reload 1
    update tick
}

Widget RAM_Used_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / 1024, 0).' M'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    size 13
    align 'L'
    width 90
    height 18
    reload 1
    update tick
}

Widget RAM_Bar {
    class 'GraphicBar'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    color '52ffff'
    background '081442'
    max 100
    length 80
    width 7
    direction 'E'
    update tack
}

# ---------------------------------------------------------------
# GPU RAM Gauge (bottom-right, small)
# Center: theme X=348, Y=250, radius=31 → 62x62
# Using meminfo as proxy (no dedicated GPU VRAM on Intel iGPU)
# ---------------------------------------------------------------

Widget GPU_RAM_Gauge {
    class 'Gauge'
    expression exec('cat /sys/class/drm/card0/gt/gt0/rps_act_freq_mhz 2>/dev/null || echo 0', 1000) / exec('cat /sys/class/drm/card0/gt/gt0/rps_max_freq_mhz 2>/dev/null || echo 1050', 5000) * 100
    width 62
    height 62
    min 0
    max 100
    start 330
    sweep 300
    thickness 5
    color 'ff00ad'
    background '000000ff'
    update tack
    direction 'CCW'
}

Widget GPU_RAM_Pct_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/drm/card0/gt/gt0/rps_act_freq_mhz 2>/dev/null || echo 0', 1000) / exec('cat /sys/class/drm/card0/gt/gt0/rps_max_freq_mhz 2>/dev/null || echo 1050', 5000) * 100, 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    background '00000000'
    size 11
    align 'C'
    width 62
    height 16
    reload 1
    update tick
}

Widget GPU_RAM_Used_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/drm/card0/gt/gt0/rps_act_freq_mhz 2>/dev/null || echo 0', 1000), 0).' M'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '80ffff'
    size 13
    align 'L'
    width 80
    height 18
    reload 1
    update tick
}

Widget GPU_RAM_Bar {
    class 'GraphicBar'
    expression exec('cat /sys/class/drm/card0/gt/gt0/rps_act_freq_mhz 2>/dev/null || echo 0', 1000) / exec('cat /sys/class/drm/card0/gt/gt0/rps_max_freq_mhz 2>/dev/null || echo 1050', 5000) * 100
    color 'ff00ad'
    background '081442'
    max 100
    length 78
    width 7
    direction 'E'
    update tack
}

# ---------------------------------------------------------------
Display 'DPF'

Layout layout_magicblue {
    Layer 0 {
        # Gauge text overlays (transparent bg, on top of gauges)
        X141.Y190   'CPU_Pct_TTF'
        X148.Y335   'GPU_Pct_TTF'
        X243.Y106   'RAM_Pct_TTF'
        X243.Y318   'GPU_RAM_Pct_TTF'
    }
    Layer 1 {
        # Top bar
        X11.Y59     'Date_TTF'
        X11.Y326    'Clock_TTF'

        # Network
        X64.Y44     'NET_UL_TTF'
        X84.Y44     'NET_DL_TTF'

        # Disk
        X37.Y421    'Disk_Label_TTF'
        X68.Y351    'Disk_Used_Label_TTF'
        X66.Y391    'Disk_Used_TTF'
        X94.Y353    'Disk_Bar'

        # CPU Gauge + info
        X103.Y190   'CPU_Gauge'
        X148.Y98    'CPU_Freq_TTF'
        X165.Y35    'CPU_Temp_TTF'

        # GPU Gauge + info
        X121.Y332   'GPU_Gauge'
        X165.Y430   'GPU_Temp_TTF'

        # RAM (bottom-left)
        X220.Y106   'RAM_Gauge'
        X241.Y23    'RAM_Used_TTF'
        X267.Y20    'RAM_Bar'

        # GPU RAM (bottom-right)
        X220.Y318   'GPU_RAM_Gauge'
        X241.Y387   'GPU_RAM_Used_TTF'
        X267.Y384   'GPU_RAM_Bar'
    }

    Layer 2 {
        X1.Y1 'Background'
    }
}

Layout 'layout_magicblue'

Variables {
    backlight 7
    eth_if 'eno1'
    tick 1000
    tack 500
}
