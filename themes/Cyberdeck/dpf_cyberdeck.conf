# Theme design: @hicwic (Cyberdeck)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
# GPU stats require nvidia-smi (NVIDIA GPUs)
# CPU fan reads PWM from hwmon — adjust hwmon path for your system
# FPS is a placeholder — pipe your FPS data to /tmp/lcd4linux_fps
# Line graph widget is not available in lcd4linux — skipped
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 0
    Backlight  backlight
}

# ---------------------------------------------------------------
# Cyberdeck theme — 480x320 landscape
# Zones: CPU (top-left), CPU Fan (center-left), RAM (bottom-left),
#        GPU (right), GPU Fan (center), GPU VRAM (top-right),
#        FPS (bottom-left), Network (bottom-right)
# ---------------------------------------------------------------

Widget Background {
    class 'Image'
    file 'themes/Cyberdeck/background.png'
    reload 0
    update 0
    visible 1
}

# --- CPU Usage Gauge (top-left) ---
Widget CPU_Gauge {
    class 'Gauge'
    expression proc_stat::cpu('busy', 500)
    width 78
    height 78
    min 0
    max 100
    start 30
    sweep 360
    thickness 15
    color 'f8b133'
    background '000000ff'
    update tack
    direction 'CCW'
}
Widget CPU_Pct_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0).'%'
    font 'fonts/roboto/Roboto-Bold.ttf'
    fcolor 'f8b133'
    background '00000000'
    size 20
    align 'C'
    width 78
    height 26
    reload 1
    update tick
}

# --- CPU Temperature ---
Widget CPU_Temp_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp 2>/dev/null | head -1 || echo 0', 5000) / 1000, 0).'°C'
    font 'fonts/roboto/Roboto-Bold.ttf'
    fcolor 'f8b133'
    background '00000000'
    size 18
    align 'L'
    width 90
    height 30
    reload 1
    update 5000
}

# --- CPU Fan Speed Gauge (center-left) ---
Widget CPU_Fan_Gauge {
    class 'Gauge'
    expression exec('cat /sys/class/hwmon/hwmon0/pwm1 2>/dev/null || echo 0', 5000) * 100 / 255
    width 62
    height 62
    min 0
    max 100
    start 230
    sweep 360
    thickness 13
    color 'c86432'
    background '000000ff'
    update 5000
    direction 'CCW'
}
Widget CPU_Fan_Pct_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/hwmon/hwmon0/pwm1 2>/dev/null || echo 0', 5000) * 100 / 255, 0).'%'
    font 'fonts/roboto/Roboto-Bold.ttf'
    fcolor 'f8b133'
    background '00000000'
    size 15
    align 'C'
    width 62
    height 20
    reload 1
    update 5000
}

# --- RAM Usage Gauge (bottom-left) ---
Widget RAM_Gauge {
    class 'Gauge'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    width 62
    height 62
    min 0
    max 100
    start 70
    sweep 360
    thickness 13
    color 'c86432'
    background '000000ff'
    update tack
    direction 'CCW'
}
Widget RAM_Pct_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100, 0).'%'
    font 'fonts/roboto/Roboto-Bold.ttf'
    fcolor 'f8b133'
    background '00000000'
    size 13
    align 'C'
    width 62
    height 18
    reload 1
    update tick
}

# --- GPU Usage Gauge (right) ---
Widget GPU_Gauge {
    class 'Gauge'
    expression exec('nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits 2>/dev/null || echo 0', 1000)
    width 102
    height 102
    min 0
    max 100
    start 340
    sweep 360
    thickness 25
    color 'ff0000'
    background '000000ff'
    update tack
    direction 'CCW'
}
Widget GPU_Pct_TTF {
    class 'Truetype'
    expression precision(exec('nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits 2>/dev/null || echo 0', 1000), 0).'%'
    font 'fonts/roboto/Roboto-Bold.ttf'
    fcolor '15b0e7'
    background '00000000'
    size 20
    align 'C'
    width 102
    height 26
    reload 1
    update tick
}

# --- GPU VRAM Bar + Text (top-right) ---
Widget GPU_Mem_Bar {
    class 'GraphicBar'
    expression exec('nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits 2>/dev/null || echo 0', 1000) / exec('nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits 2>/dev/null || echo 1', 1000) * 100
    length 102
    width 9
    min 0
    max 100
    direction 'E'
    color 'ff0000'
    background '000000ff'
    update tick
}
Widget GPU_Mem_TTF {
    class 'Truetype'
    expression precision(exec('nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits 2>/dev/null || echo 0', 1000) / exec('nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits 2>/dev/null || echo 1', 1000) * 100, 0).'%'
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor '15b0e7'
    background '00000000'
    size 15
    align 'L'
    width 30
    height 26
    reload 1
    update tick
}

# --- GPU Temperature ---
Widget GPU_Temp_TTF {
    class 'Truetype'
    expression precision(exec('nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits 2>/dev/null || echo 0', 1000), 0).'°C'
    font 'fonts/roboto/Roboto-Bold.ttf'
    fcolor 'f8b133'
    background '00000000'
    size 18
    align 'L'
    width 90
    height 30
    reload 1
    update tick
}

# --- GPU Fan Speed Gauge (center) ---
Widget GPU_Fan_Gauge {
    class 'Gauge'
    expression exec('nvidia-smi --query-gpu=fan.speed --format=csv,noheader,nounits 2>/dev/null || echo 0', 1000)
    width 62
    height 62
    min 0
    max 100
    start 130
    sweep 360
    thickness 13
    color 'c86432'
    background '000000ff'
    update tack
    direction 'CW'
}
Widget GPU_Fan_Pct_TTF {
    class 'Truetype'
    expression precision(exec('nvidia-smi --query-gpu=fan.speed --format=csv,noheader,nounits 2>/dev/null || echo 0', 1000), 0).'%'
    font 'fonts/roboto/Roboto-Bold.ttf'
    fcolor 'f8b133'
    background '00000000'
    size 15
    align 'C'
    width 62
    height 20
    reload 1
    update tick
}

# --- FPS (bottom-left) ---
# Pipe FPS data: echo 60 > /tmp/lcd4linux_fps
Widget FPS_TTF {
    class 'Truetype'
    expression precision(exec('cat /tmp/lcd4linux_fps 2>/dev/null || echo 0', 1000), 0)
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    background '00000000'
    size 22
    align 'R'
    width 65
    height 34
    reload 1
    update tick
}
Widget FPS_Spark {
    class 'sparkline'
    expression exec('cat /tmp/lcd4linux_fps 2>/dev/null || echo 0', 1000)
    color 'ffffff'
    background '000000ff'
    length 133
    width 82
    update tick
}

# --- Network (bottom-right) ---
Widget NET_ETH_DL_TTF {
    class 'Truetype'
    expression (netdev(eth_if, 'Rx_bytes', 1000) / 1024 >= 1000) ? precision(netdev(eth_if, 'Rx_bytes', 1000) / 1024 / 1024, 1).' M/s' : precision(netdev(eth_if, 'Rx_bytes', 1000) / 1024, 1).' K/s'
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    background '00000000'
    size 8
    align 'L'
    width 72
    height 14
    reload 1
    update tick
}
Widget NET_ETH_UL_TTF {
    class 'Truetype'
    expression (netdev(eth_if, 'Tx_bytes', 1000) / 1024 >= 1000) ? precision(netdev(eth_if, 'Tx_bytes', 1000) / 1024 / 1024, 1).' M/s' : precision(netdev(eth_if, 'Tx_bytes', 1000) / 1024, 1).' K/s'
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    background '00000000'
    size 8
    align 'L'
    width 72
    height 14
    reload 1
    update tick
}

# ---------------------------------------------------------------
# Layout — 480x320 landscape, Orientation 0
# Coordinate mapping: Layout X = theme Y (row/vertical),
#                     Layout Y = theme X (col/horizontal)
# ---------------------------------------------------------------
Layout layout_cyberdeck {
    Layer 0 {
        # Gauge percentage text (drawn on top of gauges)
        X57.Y41     'CPU_Pct_TTF'
        X120.Y139   'CPU_Fan_Pct_TTF'
        X202.Y79    'RAM_Pct_TTF'
        X153.Y336   'GPU_Pct_TTF'
        X58.Y202    'GPU_Fan_Pct_TTF'
    }
    Layer 1 {
        # CPU zone
        X31.Y41     'CPU_Gauge'
        X130.Y40    'CPU_Temp_TTF'
        # CPU Fan
        X99.Y139    'CPU_Fan_Gauge'
        # RAM
        X180.Y79    'RAM_Gauge'
        # GPU zone
        X115.Y336   'GPU_Gauge'
        X153.Y245   'GPU_Temp_TTF'
        # GPU VRAM
        X48.Y349    'GPU_Mem_Bar'
        X40.Y318    'GPU_Mem_TTF'
        # GPU Fan
        X37.Y202    'GPU_Fan_Gauge'
        # FPS
        X273.Y46    'FPS_TTF'
        X220.Y180   'FPS_Spark'
        # Network
        X257.Y398   'NET_ETH_DL_TTF'
        X293.Y351   'NET_ETH_UL_TTF'
    }
    Layer 2 {
        X1.Y1 'Background'
    }
}

Display 'DPF'

Layout 'layout_cyberdeck'

Variables {
    backlight 7
    tick 1000
    tack 500
    eth_if 'eno1'
}
