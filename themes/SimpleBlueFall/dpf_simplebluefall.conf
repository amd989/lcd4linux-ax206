# Theme design: @takattila (turing-smart-screen-python)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 1
    Backlight  backlight
}

# ---------------------------------------------------------------
# SimpleBlueFall theme — 320x480 portrait
# 4 sections: CPU%, RAM%, GPU%, CPU Temp
# ---------------------------------------------------------------

Widget Background {
    class 'Image'
    file 'themes/SimpleBlueFall/background.png'
    reload 0
    update 0
    visible 1
}

# --- Section 1: CPU % (rows 0-119) ---
Widget CPU_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update tick
}
Widget CPU_Label_TTF {
    class 'Truetype'
    expression '%  CPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'cccccc'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}
Widget CPU_Model_TTF {
    class 'Truetype'
    expression cpuinfo('model name')
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '0078ff'
    size 10
    align 'L'
    width 150
    height 16
    update 0
}
# CPU_GBar border — 0078ff outline
Widget CPU_GBar_Border {
    class 'graphicbar'
    expression 100
    color '0078ff'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget CPU_GBar {
    class 'graphicbar'
    expression proc_stat::cpu('busy', 500)
    color '0078ff'
    colorhigh '0078ff'
    colorlow '0078ff'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update tack
}

# --- Section 2: RAM % (rows 120-239) ---
Widget RAM_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100, 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update tick
}
Widget RAM_Label_TTF {
    class 'Truetype'
    expression '%  RAM'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'cccccc'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}
Widget RAM_Model_TTF {
    class 'Truetype'
    expression precision(meminfo('MemTotal')/1024, 0).' MB'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '2c8ffe'
    size 10
    align 'L'
    width 150
    height 16
    update 0
}
# RAM_GBar border — 2c8ffe outline
Widget RAM_GBar_Border {
    class 'graphicbar'
    expression 100
    color '2c8ffe'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget RAM_GBar {
    class 'graphicbar'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    color '2c8ffe'
    colorhigh '2c8ffe'
    colorlow '2c8ffe'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update tack
}

# --- Section 3: GPU / System Load (rows 240-359) ---
Widget GPU_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('system', 500), 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update tick
}
Widget GPU_Label_TTF {
    class 'Truetype'
    expression '%  GPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'cccccc'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}
Widget GPU_Model_TTF {
    class 'Truetype'
    expression exec('/usr/bin/lspci 2>/dev/null | grep -i vga | sed "s/.*: //"', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '56a6ff'
    size 10
    align 'L'
    width 150
    height 16
    reload 1
    update 5000
}
# GPU_GBar border — 56a6ff outline
Widget GPU_GBar_Border {
    class 'graphicbar'
    expression 100
    color '56a6ff'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget GPU_GBar {
    class 'graphicbar'
    expression proc_stat::cpu('system', 500)
    color '56a6ff'
    colorhigh '56a6ff'
    colorlow '56a6ff'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update tack
}

# --- Section 4: CPU Temperature (rows 360-479) ---
Widget TEMP_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp', 10000) / 1000, 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update 5000
}
Widget TEMP_Label_TTF {
    class 'Truetype'
    expression '°C CPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'cccccc'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}
Widget TEMP_Model_TTF {
    class 'Truetype'
    expression cpuinfo('model name')
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '7fbbff'
    size 10
    align 'L'
    width 150
    height 16
    update 0
}
# TEMP_GBar border — 7fbbff outline
Widget TEMP_GBar_Border {
    class 'graphicbar'
    expression 100
    color '7fbbff'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget TEMP_GBar {
    class 'graphicbar'
    expression exec('cat /sys/class/thermal/thermal_zone4/temp', 10000) / 1000
    color '7fbbff'
    colorhigh '7fbbff'
    colorlow '7fbbff'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update 5000
}

# ---------------------------------------------------------------
Display 'DPF'

Layout layout_simplebluefall {
    Layer 1 {
        # --- Section 1: CPU % ---
        X16.Y6     'CPU_TTF'
        X11.Y171   'CPU_Label_TTF'
        X47.Y171   'CPU_Model_TTF'
        X65.Y171 'CPU_GBar_Border'

        X66.Y172 'CPU_GBar'
        # --- Section 2: RAM % ---
        X131.Y6    'RAM_TTF'
        X126.Y171  'RAM_Label_TTF'
        X165.Y171  'RAM_Model_TTF'
        X183.Y171 'RAM_GBar_Border'

        X184.Y172 'RAM_GBar'
        # --- Section 3: GPU % ---
        X251.Y6    'GPU_TTF'
        X246.Y171  'GPU_Label_TTF'
        X283.Y171  'GPU_Model_TTF'
        X301.Y171 'GPU_GBar_Border'

        X302.Y172 'GPU_GBar'
        # --- Section 4: CPU Temp ---
        X371.Y6    'TEMP_TTF'
        X363.Y171  'TEMP_Label_TTF'
        X403.Y171  'TEMP_Model_TTF'
        X421.Y171 'TEMP_GBar_Border'

        X422.Y172 'TEMP_GBar'
    }
    Layer 2 {
        X1.Y1 'Background'
    }
}

Layout 'layout_simplebluefall'

Variables {
    backlight 7
    tick 1000
    tack 500
}
