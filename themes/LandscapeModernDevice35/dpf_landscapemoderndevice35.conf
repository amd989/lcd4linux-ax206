# Theme design: @napobear (turing-smart-screen-python)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 0
    Backlight  backlight
}

# ---------------------------------------------------------------
# LandscapeModernDevice35 theme — 480x320 landscape
# Server monitoring dashboard with CPU sparkline, network sparklines,
# memory, and filesystem stats
#
# Colors: Orange fa802d (values/bars), Cyan (labels in bg),
#         White ffffff (network text), Gray c8c8c8 (date/clock)
#
# COORDINATE MAPPING for landscape (Orientation 0):
#   Layout X{n} = theme_Y  (vertical position)
#   Layout Y{n} = theme_X  (horizontal position)
# ---------------------------------------------------------------

Widget Background {
    class 'Image'
    file 'themes/LandscapeModernDevice35/background.png'
    reload 0
    update 0
    visible 1
}

# ---------------------------------------------------------------
# Top bar: Date, Uptime, Clock
# ---------------------------------------------------------------

Widget Date_TTF {
    class 'Truetype'
    expression exec('date +"%b %e, %Y"', 60000)
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'c8c8c8'
    size 8
    align 'L'
    width 78
    height 16
    reload 1
    update 60000
}

Widget Uptime_TTF {
    class 'Truetype'
    expression uptime('%d days, %H:%M:%S')
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'fa802d'
    size 12
    align 'C'
    width 180
    height 20
    reload 1
    update 5000
}

Widget Clock_TTF {
    class 'Truetype'
    expression exec('date +"%H:%M:%S %Z"', 1000)
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'c8c8c8'
    size 8
    align 'L'
    width 92
    height 16
    reload 1
    update 1000
}

# ---------------------------------------------------------------
# CPU section (left)
# ---------------------------------------------------------------

# CPU Load percentage
Widget CPU_Pct_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0).'%'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'fa802d'
    size 10
    align 'L'
    width 50
    height 16
    reload 1
    update tick
}

# CPU Load bar
Widget CPU_Bar {
    class 'GraphicBar'
    expression proc_stat::cpu('busy', 500)
    color 'fa802d'
    background '1a2a3a'
    max 100
    length 192
    width 7
    direction 'E'
    update tack
}

# CPU sparkline (line graph)
Widget CPU_Spark {
    class 'sparkline'
    expression proc_stat::cpu('busy', 500)
    color 'fa3232'
    background '000000ff'
    length 186
    width 60
    update tick
}

# CPU Temperature
Widget CPU_Temp_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp', 5000) / 1000, 0).'°C'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'fa802d'
    size 10
    align 'L'
    width 50
    height 16
    reload 1
    update 5000
}

# CPU Temperature bar (max 120)
Widget CPU_Temp_Bar {
    class 'GraphicBar'
    expression exec('cat /sys/class/thermal/thermal_zone4/temp', 5000) / 1000
    color 'fa802d'
    background '1a2a3a'
    max 120
    length 192
    width 7
    direction 'E'
    update 5000
}

# Fan speed
Widget CPU_Fan_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/hwmon/hwmon0/pwm1 2>/dev/null || echo 0', 5000) * 100 / 255, 0).'%'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'fa802d'
    size 10
    align 'L'
    width 50
    height 16
    reload 1
    update 5000
}

# Fan speed bar
Widget CPU_Fan_Bar {
    class 'GraphicBar'
    expression exec('cat /sys/class/hwmon/hwmon0/pwm1 2>/dev/null || echo 0', 5000) * 100 / 255
    color 'fa802d'
    background '1a2a3a'
    max 100
    length 192
    width 7
    direction 'E'
    update 5000
}

# ---------------------------------------------------------------
# Network section (right) — ETH + WiFi sparklines + text
# ---------------------------------------------------------------

# ETH Download text
Widget NET_ETH_DL_TTF {
    class 'Truetype'
    expression (netdev(eth_if, 'Rx_bytes', 1000) / 1024 >= 1000) ? precision(netdev(eth_if, 'Rx_bytes', 1000) / 1024 / 1024, 1).' M/s' : precision(netdev(eth_if, 'Rx_bytes', 1000) / 1024, 1).' K/s'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'ffffff'
    size 8
    align 'L'
    width 86
    height 12
    reload 1
    update tick
}

# ETH Download sparkline
Widget NET_ETH_DL_Spark {
    class 'sparkline'
    expression netdev(eth_if, 'Rx_bytes', 1000) / 1024
    color 'fa3232'
    background '000000ff'
    length 86
    width 61
    update tick
}

# ETH Upload text
Widget NET_ETH_UL_TTF {
    class 'Truetype'
    expression (netdev(eth_if, 'Tx_bytes', 1000) / 1024 >= 1000) ? precision(netdev(eth_if, 'Tx_bytes', 1000) / 1024 / 1024, 1).' M/s' : precision(netdev(eth_if, 'Tx_bytes', 1000) / 1024, 1).' K/s'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'ffffff'
    size 8
    align 'L'
    width 86
    height 12
    reload 1
    update tick
}

# ETH Upload sparkline
Widget NET_ETH_UL_Spark {
    class 'sparkline'
    expression netdev(eth_if, 'Tx_bytes', 1000) / 1024
    color 'fa3232'
    background '000000ff'
    length 86
    width 61
    update tick
}

# WiFi Download text
Widget NET_WLO_DL_TTF {
    class 'Truetype'
    expression (netdev(wlan_if, 'Rx_bytes', 1000) / 1024 >= 1000) ? precision(netdev(wlan_if, 'Rx_bytes', 1000) / 1024 / 1024, 1).' M/s' : precision(netdev(wlan_if, 'Rx_bytes', 1000) / 1024, 1).' K/s'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'ffffff'
    size 8
    align 'L'
    width 86
    height 12
    reload 1
    update tick
}

# WiFi Download sparkline
Widget NET_WLO_DL_Spark {
    class 'sparkline'
    expression netdev(wlan_if, 'Rx_bytes', 1000) / 1024
    color 'fa3232'
    background '000000ff'
    length 86
    width 61
    update tick
}

# WiFi Upload text
Widget NET_WLO_UL_TTF {
    class 'Truetype'
    expression (netdev(wlan_if, 'Tx_bytes', 1000) / 1024 >= 1000) ? precision(netdev(wlan_if, 'Tx_bytes', 1000) / 1024 / 1024, 1).' M/s' : precision(netdev(wlan_if, 'Tx_bytes', 1000) / 1024, 1).' K/s'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'ffffff'
    size 8
    align 'L'
    width 86
    height 12
    reload 1
    update tick
}

# WiFi Upload sparkline
Widget NET_WLO_UL_Spark {
    class 'sparkline'
    expression netdev(wlan_if, 'Tx_bytes', 1000) / 1024
    color 'fa3232'
    background '000000ff'
    length 86
    width 61
    update tick
}

# ---------------------------------------------------------------
# Virtual Memory section (bottom-left)
# ---------------------------------------------------------------

# RAM Total
Widget RAM_Total_TTF {
    class 'Truetype'
    expression precision(meminfo('MemTotal') / 1024, 0).' M'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'fa802d'
    size 10
    align 'L'
    width 100
    height 16
    reload 1
    update 60000
}

# RAM bar
Widget RAM_Bar {
    class 'GraphicBar'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    color 'fa802d'
    background '1a2a3a'
    max 100
    length 192
    width 7
    direction 'E'
    update tack
}

# RAM Used
Widget RAM_Used_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / 1024, 0).' M'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'fa802d'
    size 10
    align 'L'
    width 80
    height 16
    reload 1
    update tick
}

# RAM Free
Widget RAM_Free_TTF {
    class 'Truetype'
    expression precision(meminfo('MemAvailable') / 1024, 0).' M'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'fa802d'
    size 10
    align 'L'
    width 80
    height 16
    reload 1
    update tick
}

# ---------------------------------------------------------------
# Filesystem section (bottom-right)
# ---------------------------------------------------------------

# Disk Total
Widget Disk_Total_TTF {
    class 'Truetype'
    expression precision(statfs('/', 'blocks') * statfs('/', 'bsize') / 1073741824, 0).' G'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'fa802d'
    size 10
    align 'L'
    width 80
    height 16
    reload 1
    update 60000
}

# Disk bar
Widget Disk_Bar {
    class 'GraphicBar'
    expression (1 - 1.0 * statfs('/', 'bavail') / statfs('/', 'blocks')) * 100
    color 'fa802d'
    background '1a2a3a'
    max 100
    length 192
    width 7
    direction 'E'
    update 10000
}

# Disk Used
Widget Disk_Used_TTF {
    class 'Truetype'
    expression precision((statfs('/', 'blocks') - statfs('/', 'bavail')) * statfs('/', 'bsize') / 1073741824, 0).' G'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'fa802d'
    size 10
    align 'L'
    width 80
    height 16
    reload 1
    update 10000
}

# Disk Free
Widget Disk_Free_TTF {
    class 'Truetype'
    expression precision(statfs('/', 'bavail') * statfs('/', 'bsize') / 1073741824, 0).' G'
    font 'fonts/roboto-mono/RobotoMono-Bold.ttf'
    fcolor 'fa802d'
    size 10
    align 'L'
    width 80
    height 16
    reload 1
    update 10000
}

# ---------------------------------------------------------------
Display 'DPF'

Layout layout_modern {
    Layer 1 {
        # Top bar
        X8.Y11     'Date_TTF'
        X7.Y190    'Uptime_TTF'
        X8.Y378    'Clock_TTF'

        # CPU section
        X57.Y87     'CPU_Pct_TTF'
        X73.Y23     'CPU_Bar'
        X90.Y25     'CPU_Spark'
        X162.Y87    'CPU_Temp_TTF'
        X178.Y23    'CPU_Temp_Bar'
        X192.Y87    'CPU_Fan_TTF'
        X208.Y23    'CPU_Fan_Bar'

        # Network — Ethernet
        X66.Y301    'NET_ETH_DL_TTF'
        X75.Y275    'NET_ETH_DL_Spark'
        X66.Y401    'NET_ETH_UL_TTF'
        X75.Y375    'NET_ETH_UL_Spark'

        # Network — WiFi
        X142.Y301   'NET_WLO_DL_TTF'
        X150.Y275   'NET_WLO_DL_Spark'
        X142.Y401   'NET_WLO_UL_TTF'
        X150.Y375   'NET_WLO_UL_Spark'

        # Virtual Memory
        X260.Y57    'RAM_Total_TTF'
        X279.Y23    'RAM_Bar'
        X290.Y57    'RAM_Used_TTF'
        X290.Y165   'RAM_Free_TTF'

        # Filesystem
        X260.Y296   'Disk_Total_TTF'
        X279.Y263   'Disk_Bar'
        X290.Y296   'Disk_Used_TTF'
        X290.Y404   'Disk_Free_TTF'
    }

    Layer 2 {
        X1.Y1 'Background'
    }
}

Layout 'layout_modern'

Variables {
    backlight 7
    eth_if 'eno1'
    tick 1000
    tack 500
    wlan_if 'wlp0s20f3'
}
