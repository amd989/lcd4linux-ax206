# Theme design: @mathoudebine (turing-smart-screen-python)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 3
    Backlight  backlight
}

# ---------------------------------------------------------------
# Cyberpunk theme — 320x480 portrait
# Cyberpunk 2077 styled UI with 3 info panels + disk + date/clock
#
# Colors: Cyan 02d8f3 (values/bars), Yellow ffef08 (labels/models)
#
# COORDINATE MAPPING for portrait mode (Orientation 1):
#   Layout X{n} = theme_Y + 1  (vertical position)
#   Layout Y{n} = theme_X + 1  (horizontal position)
# ---------------------------------------------------------------

Widget Background {
    class 'Image'
    file 'themes/Cyberpunk/background.png'
    reload 0
    update 0
    visible 1
}

# ---------------------------------------------------------------
# Header: Clock (top-right, next to Cyberpunk logo)
# ---------------------------------------------------------------

Widget Clock_TTF {
    class 'Truetype'
    expression exec('date +"%l:%M:%S %p"', 1000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffef08'
    size 11
    align 'L'
    width 130
    height 16
    reload 1
    update 1000
}

# ---------------------------------------------------------------
# CPU Panel: temp, frequency, percentage, bar, model
# ---------------------------------------------------------------

# CPU temperature — cyan, small
Widget CPU_Temp_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp', 10000) / 1000, 0).'°C'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '02d8f3'
    size 12
    align 'L'
    width 40
    height 16
    reload 1
    update 5000
}

# CPU frequency — yellow, small
Widget CPU_Freq_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq', 60000) / 1000000, 2).' GHZ'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffef08'
    size 12
    align 'R'
    width 84
    height 16
    reload 1
    update 5000
}

# CPU percentage — cyan, large
Widget CPU_Pct_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '02d8f3'
    size 32
    align 'R'
    width 90
    height 38
    reload 1
    update tick
}

# CPU bar border — cyan outline (always full)
Widget CPU_Bar_Border {
    class 'graphicbar'
    expression 100
    color '02d8f3'
    background '000000'
    style 'H'
    max 100
    length 130
    width 13
    direction 'E'
    update 0
}

# CPU bar fill — cyan (inset 1px inside border)
Widget CPU_Bar {
    class 'graphicbar'
    expression proc_stat::cpu('busy', 500)
    color '02d8f3'
    colorhigh '02d8f3'
    colorlow '02d8f3'
    background '000000'
    max 100
    length 128
    width 11
    direction 'E'
    update tack
}

# CPU model — yellow, small
Widget CPU_Model_TTF {
    class 'Truetype'
    expression exec('cat /proc/cpuinfo | grep "model name" | head -1 | sed "s/.*: //;s/(R)//g;s/(TM)//g;s/ CPU//;s/  */ /g"', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffef08'
    size 11
    align 'L'
    width 230
    height 14
    reload 1
    update 60000
}

# ---------------------------------------------------------------
# GPU Panel: temp, memory, percentage, bar, model
# Since there's no GPU plugin, we use proxies
# ---------------------------------------------------------------

# GPU temperature — cyan (using CPU temp as proxy)
Widget GPU_Temp_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp', 10000) / 1000, 0).'°C'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '02d8f3'
    size 12
    align 'L'
    width 40
    height 16
    reload 1
    update 5000
}

# GPU memory — yellow (using total RAM as proxy placeholder)
Widget GPU_Mem_TTF {
    class 'Truetype'
    expression precision(meminfo('MemTotal') / 1024, 0).' M'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffef08'
    size 12
    align 'R'
    width 84
    height 16
    reload 1
    update 10000
}

# GPU percentage — cyan, large (system CPU as proxy)
Widget GPU_Pct_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('system', 500), 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '02d8f3'
    size 32
    align 'R'
    width 90
    height 38
    reload 1
    update tick
}

# GPU bar border — cyan outline (always full)
Widget GPU_Bar_Border {
    class 'graphicbar'
    expression 100
    color '02d8f3'
    background '000000'
    style 'H'
    max 100
    length 130
    width 13
    direction 'E'
    update 0
}

# GPU bar fill — cyan (inset 1px inside border)
Widget GPU_Bar {
    class 'graphicbar'
    expression proc_stat::cpu('system', 500)
    color '02d8f3'
    colorhigh '02d8f3'
    colorlow '02d8f3'
    background '000000'
    max 100
    length 128
    width 11
    direction 'E'
    update tack
}

# GPU model — yellow, small
Widget GPU_Model_TTF {
    class 'Truetype'
    expression exec('/usr/bin/lspci 2>/dev/null | grep -i vga | sed "s/.*: //;s/ Corporation//g;s/Intel //"', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffef08'
    size 11
    align 'L'
    width 230
    height 14
    reload 1
    update 5000
}

# ---------------------------------------------------------------
# RAM Panel: used, free, percentage, bar, model
# ---------------------------------------------------------------

# RAM used — cyan, small
Widget RAM_Used_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / 1024, 0).' M'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '02d8f3'
    size 12
    align 'L'
    width 75
    height 16
    reload 1
    update tick
}

# RAM free — yellow, small
Widget RAM_Free_TTF {
    class 'Truetype'
    expression precision(meminfo('MemAvailable') / 1024, 0).' M'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffef08'
    size 12
    align 'R'
    width 75
    height 16
    reload 1
    update tick
}

# RAM percentage — cyan, large
Widget RAM_Pct_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100, 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '02d8f3'
    size 32
    align 'R'
    width 85
    height 38
    reload 1
    update tick
}

# RAM bar border — cyan outline (always full)
Widget RAM_Bar_Border {
    class 'graphicbar'
    expression 100
    color '02d8f3'
    background '000000'
    style 'H'
    max 100
    length 130
    width 13
    direction 'E'
    update 0
}

# RAM bar fill — cyan (inset 1px inside border)
Widget RAM_Bar {
    class 'graphicbar'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    color '02d8f3'
    colorhigh '02d8f3'
    colorlow '02d8f3'
    background '000000'
    max 100
    length 128
    width 11
    direction 'E'
    update tack
}

# RAM model — yellow, small
Widget RAM_Model_TTF {
    class 'Truetype'
    expression precision(meminfo('MemTotal') / 1024, 0).' MB Total'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffef08'
    size 11
    align 'L'
    width 230
    height 14
    reload 1
    update 60000
}

# ---------------------------------------------------------------
# Disk section: used/free labels and values in GB
# ---------------------------------------------------------------

# "DISK USED" label — yellow
Widget Disk_Used_Label_TTF {
    class 'Truetype'
    expression 'DISK USED'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffef08'
    size 12
    align 'L'
    width 110
    height 16
    update 0
}

# Disk used value — cyan, medium
Widget Disk_Used_TTF {
    class 'Truetype'
    expression precision((statfs('/', 'blocks') - statfs('/', 'bavail')) * statfs('/', 'bsize') / 1073741824, 0).' G'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '02d8f3'
    size 21
    align 'R'
    width 85
    height 28
    reload 1
    update 10000
}

# "DISK FREE" label — yellow
Widget Disk_Free_Label_TTF {
    class 'Truetype'
    expression 'DISK FREE'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffef08'
    size 12
    align 'L'
    width 110
    height 16
    update 0
}

# Disk free value — cyan, medium
Widget Disk_Free_TTF {
    class 'Truetype'
    expression precision(statfs('/', 'bavail') * statfs('/', 'bsize') / 1073741824, 0).' G'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '02d8f3'
    size 21
    align 'R'
    width 85
    height 28
    reload 1
    update 10000
}

# Disk usage percentage — cyan, bottom-right
Widget Disk_Pct_TTF {
    class 'Truetype'
    expression precision((1 - 1.0 * statfs('/', 'bavail') / statfs('/', 'blocks')) * 100, 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '02d8f3'
    size 24
    align 'R'
    width 70
    height 28
    reload 1
    update 10000
}

# ---------------------------------------------------------------
# Footer: Date (bottom-left)
# ---------------------------------------------------------------

Widget Date_TTF {
    class 'Truetype'
    expression exec('date +"%b %e, %Y" | tr "[:lower:]" "[:upper:]"', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffef08'
    size 14
    align 'L'
    width 170
    height 20
    reload 1
    update 60000
}

# ---------------------------------------------------------------
Display 'DPF'

Layout layout_cyberpunk {
    Layer 1 {
        # --- Header: Clock ---
        X33.Y194    'Clock_TTF'

        # --- CPU Panel ---
        X81.Y41     'CPU_Temp_TTF'
        X81.Y91     'CPU_Freq_TTF'
        X80.Y195    'CPU_Pct_TTF'
        X101.Y41    'CPU_Bar_Border'
        X102.Y42    'CPU_Bar'
        X128.Y51    'CPU_Model_TTF'

        # --- GPU Panel ---
        X168.Y41    'GPU_Temp_TTF'
        X168.Y91    'GPU_Mem_TTF'
        X168.Y195   'GPU_Pct_TTF'
        X189.Y41    'GPU_Bar_Border'
        X190.Y42    'GPU_Bar'
        X216.Y51    'GPU_Model_TTF'

        # --- RAM Panel ---
        X257.Y41    'RAM_Used_TTF'
        X257.Y115   'RAM_Free_TTF'
        X256.Y195   'RAM_Pct_TTF'
        X277.Y41    'RAM_Bar_Border'
        X278.Y42    'RAM_Bar'
        X304.Y51    'RAM_Model_TTF'

        # --- Disk Section ---
        X347.Y44    'Disk_Used_Label_TTF'
        X335.Y190   'Disk_Used_TTF'
        X392.Y44    'Disk_Free_Label_TTF'
        X380.Y190   'Disk_Free_TTF'
        X435.Y185   'Disk_Pct_TTF'

        # --- Footer: Date ---
        X456.Y11    'Date_TTF'
    }

    Layer 2 {
        X1.Y1 'Background'
    }
}

Layout 'layout_cyberpunk'

Variables {
    backlight 7
    tick 1000
    tack 500
}
