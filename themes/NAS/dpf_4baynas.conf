# ---------------------------------------------------------------
# Section 2: HDD I/O (Bottom Left)
# ---------------------------------------------------------------
Widget IO_Title {
    class 'Truetype'
    expression 'I/O'
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    size 10
    align 'L'
    width 55
    height 15
    update 0
}


Widget IO_Read_Val {
    class 'Truetype'
    expression precision(diskstats(io_disk, 'read_sectors', 500) / 2048, 1)
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    size 12
    align 'L'
    width 45
    height 20
    reload 1
    update tack
}


Widget IO_Write_Val {
    class 'Truetype'
    expression precision(diskstats(io_disk, 'write_sectors', 500) / 2048, 1)
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    size 12
    align 'L'
    width 45
    height 20
    reload 1
    update tack
}


Widget IO_Unit {
    class 'Truetype'
    expression 'MB/s'
    font 'fonts/jetbrains-mono/JetBrainsMono-Regular.ttf'
