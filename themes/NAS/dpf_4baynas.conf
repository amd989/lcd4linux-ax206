# Theme: 4-Bay NAS
# Target: 320x480 Portrait (DPF)
# Font: JetBrains Mono

Display dpf {
    Driver 'DPF'
    Port 'usb0'
    Font '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor '1a1a1a'
    Orientation 1
    Backlight backlight
}


# ---------------------------------------------------------------
# Variables
# ---------------------------------------------------------------
Variables {
    backlight 7
    tick 1000
    tack 500

    # Primary network interface
    iface 'enp93s0'

    # Mount points for the 4 bays
    bay1_path '/srv/dev-disk-by-uuid-85505023-7299-4b41-8fad-1ec6131be3ed'
    bay2_path '/srv/dev-disk-by-uuid-9cacacb2-e2f3-4889-b7d9-5b3329877090'
    bay3_path '/srv/dev-disk-by-uuid-bc305386-f8d5-47a8-8d80-b5d0d76c3650'
    bay4_path '/srv/dev-disk-by-uuid-ce0c9493-5af9-4021-87c0-4ca5f234fbfb'
    
    # Block devices for temperature and I/O sensing
    bay1_blk 'sda'
    bay2_blk 'sdb'
    bay3_blk 'sdc'
    bay4_blk 'sdd'

    # HDD to monitor for the summary I/O section (e.g., your primary RAID device or OS disk)
    io_disk 'sdh'

    # Total Storage Summary path
    main_storage '/srv/mergerfs/nas'
}


# ---------------------------------------------------------------
# Background
# ---------------------------------------------------------------
Widget Background {
    class 'Image'
    file 'themes/NAS/Background.png'
    reload 0
    update 0
    visible 1
}


# ---------------------------------------------------------------
# Header: Time, WiFi/Eth, Global Net I/O
# ---------------------------------------------------------------
Widget Time {
    class 'Truetype'
    expression strftime('%H:%M', time())
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    size 26
    align 'C'
    width 110
    height 40
    reload 1
    update 1000
}


Widget TimeAmPm {
    class 'Truetype'
    expression strftime('%p', time())
    font 'fonts/jetbrains-mono/JetBrainsMono-Regular.ttf'
    fcolor '999999'
    size 10
    align 'L'
    width 30
    height 15
    reload 1
    update 1000
}


Widget Date {
    class 'Truetype'
    expression strftime('%A, %b %d', time())
    font 'fonts/jetbrains-mono/JetBrainsMono-Regular.ttf'
    fcolor '999999'
    size 11
    align 'C'
    width 180
    height 20
    reload 1
    update 60000
}


Widget WiFi_Name {
    class 'Truetype'
    expression iface
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    size 8
    align 'L'
    width 80
    height 12
    update 0
}


Widget IP_Addr {
    class 'Truetype'
    expression netinfo::ipaddr(iface)
    font 'fonts/jetbrains-mono/JetBrainsMono-Regular.ttf'
    fcolor '999999'
    size 7
    align 'L'
    width 80
    height 12
    reload 1
    update 60000
}


Widget Net_Down_Summary {
    class 'Truetype'
    expression '↓ '.precision((netdev(iface, 'Rx_bytes', 500) * 8) / 1048576, 1) . ' Mb/s'
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    size 8
    align 'R'
    width 75
    height 12
    reload 1
    update tack
}


Widget Net_Up_Summary {
    class 'Truetype'
    expression '↑ '.precision((netdev(iface, 'Tx_bytes', 500) * 8) / 1048576, 1) . ' Mb/s'
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    size 8
    align 'R'
    width 75
    height 12
    reload 1
    update tack
}


# ---------------------------------------------------------------
# Section 1: Storage (Top Card)
# ---------------------------------------------------------------
Widget Storage_Title {
    class 'Truetype'
    expression 'Storage'
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    size 12
    align 'L'
    width 100
    height 20
    update 0
}


Widget Storage_Status {
    class 'Truetype'
    expression '• Healthy'
    font 'fonts/jetbrains-mono/JetBrainsMono-Regular.ttf'
    fcolor '00aaff'
    size 9
    align 'R'
    width 100
    height 20
    update 0
}


Widget RAID_Label {
    class 'Truetype'
    expression 'SNAPRAID'
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor '00aaff'
    size 9
    align 'L'
    width 120
    height 15
    update 0
}


Widget Total_Usage_Text {
    class 'Truetype'
    expression precision((statfs(main_storage, 'blocks') - statfs(main_storage, 'bfree')) * statfs(main_storage, 'bsize') / 1099511627776, 1) . ' / ' . precision(statfs(main_storage, 'blocks') * statfs(main_storage, 'bsize') / 1099511627776, 1) . ' TB'
    font 'fonts/jetbrains-mono/JetBrainsMono-Regular.ttf'
    fcolor '999999'
    size 9
    align 'R'
    width 150
    height 15
    reload 1
    update 60000
}


Widget Main_Storage_Bar {
    class 'GraphicBar'
    expression (statfs(main_storage, 'blocks') - statfs(main_storage, 'bfree')) / statfs(main_storage, 'blocks') * 100
    length 280
    width 5
    direction 'E'
    color '00aaff'
    background '333333'
    min 0
    max 100
    update 60000
}


