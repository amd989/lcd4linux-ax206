    size 8
    align 'L'
    width 35
    height 20
    update 0
}


Widget IO_Sparkline {
    class 'Sparkline'
    expression exec('f=/tmp/lcd_io_' . io_disk . '; set -- $(cat /sys/block/' . io_disk . '/stat); c=$(($3+$7)); if [ -f $f ] && [ $(($(date +%s)-$(stat -c %Y $f))) -lt 15 ]; then p=$(cat $f); else p=$c; fi; echo $c > $f; echo $((c-p))', 5000)
    width 80
    length 139
    color '00aaff'
    background '000000ff'
    update tack
}


