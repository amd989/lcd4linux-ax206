    size 8
    align 'R'
    width 35
    height 12
    reload 1
    update 5000
}

Widget TEMP_Bar {
    class 'GraphicBar'
    expression exec('cat /sys/class/thermal/thermal_zone0/temp 2>/dev/null || cat /sys/class/thermal/thermal_zone1/temp 2>/dev/null || echo 45000', 10000) / 1000
    length 125
    width 4
    direction 'E'
    color '00aaff'
    background '333333'
    max 100
    update 5000
}

# ---------------------------------------------------------------
# Layout
# ---------------------------------------------------------------
Layout layout_4baynas {
    Layer 1 {
        # Header
        X5.Y100     'Time'
        X10.Y215    'TimeAmPm'
        X42.Y70     'Date'
        X8.Y15      'WiFi_Name'
        X22.Y15     'IP_Addr'
        X8.Y230     'Net_Down_Summary'
        X22.Y230    'Net_Up_Summary'

        # Storage Card
        X82.Y45     'Storage_Title'
        X82.Y175    'Storage_Status'
        X105.Y15    'RAID_Label'
        X105.Y160   'Total_Usage_Text'
        X125.Y20    'Main_Storage_Bar'
        
        # Bays
        X160.Y20    'Bay1_Label'
        X275.Y20    'Bay1_Temp'
        X295.Y20    'Bay1_Size'
        
        X160.Y95    'Bay2_Label'
        X275.Y95    'Bay2_Temp'
        X295.Y95    'Bay2_Size'
        
        X160.Y175   'Bay3_Label'
        X275.Y175   'Bay3_Temp'
        X295.Y175   'Bay3_Size'
        
        X160.Y250   'Bay4_Label'
        X275.Y250   'Bay4_Temp'
        X295.Y250   'Bay4_Size'

        # Bottom Cards
        # I/O (Left)
        X360.Y45    'IO_Title'
        X385.Y10    'IO_Read_Val'
        X385.Y65    'IO_Write_Val'
        X387.Y115   'IO_Unit'
        X415.Y15    'IO_Sparkline'

        # System (Right)
        X360.Y185   'System_Title'
        X385.Y175   'CPU_Label'
        X385.Y255   'CPU_Val'
        X402.Y175   'CPU_Bar'
        X418.Y175   'MEM_Label'
        X418.Y255   'MEM_Val'
        X435.Y175   'MEM_Bar'
        X452.Y175   'TEMP_Label'
        X452.Y255   'TEMP_Val'
        X469.Y175   'TEMP_Bar'
    }

    Layer 2 {
        X1.Y1 'Background'
    }
}

Display 'dpf'
Layout 'layout_4baynas'
