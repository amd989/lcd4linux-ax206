# ---------------------------------------------------------------
# Section 2: HDD I/O (Bottom Left)
# ---------------------------------------------------------------
Widget IO_Title {
    class 'Truetype'
    expression 'HDD I/O'
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    size 10
    align 'L'
    width 55
    height 15
    update 0
}

Widget IO_Read_Val {
    class 'Truetype'
    expression precision(diskstats(io_disk, 'read_sectors', 500) / 2048, 1)
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    size 12
    align 'R'
    width 45
    height 20
    reload 1
    update tack
}

Widget IO_Write_Val {
    class 'Truetype'
    expression precision(diskstats(io_disk, 'write_sectors', 500) / 2048, 1)
    font 'fonts/jetbrains-mono/JetBrainsMono-Bold.ttf'
    fcolor 'ffffff'
    size 12
    align 'R'
    width 45
    height 20
    reload 1
    update tack
}

Widget IO_Unit {
    class 'Truetype'
    expression 'MB/s'
    font 'fonts/jetbrains-mono/JetBrainsMono-Regular.ttf'
    fcolor '999999'
    size 8
    align 'L'
    width 35
    height 20
    update 0
}

Widget IO_Sparkline {
    class 'Sparkline'
    expression diskstats(io_disk, 'read_sectors', 500) + diskstats(io_disk, 'write_sectors', 500)
    width 20
    length 130
    samples 40
    color '00aaff'
    background '00000000'
    update tack
}

