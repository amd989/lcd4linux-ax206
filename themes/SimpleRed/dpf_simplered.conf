# Theme design: @takattila (turing-smart-screen-python)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 1
    Backlight  backlight
}

# ---------------------------------------------------------------
# SimpleRed theme — 320x480 portrait
# 4 sections: CPU%, RAM%, GPU%, CPU Temp
#
# COORDINATE MAPPING for portrait mode (Orientation 1):
#   Layout X<n> = vertical position (row), top=1 to bottom=480
#   Layout Y<n> = horizontal position (col), left=1 to right=320
#   Theme YAML X (horizontal) → Layout Y
#   Theme YAML Y (vertical)   → Layout X
#
# Graphicbar direction 'E' fills left-to-right on portrait screen.
#   For 'E': screen_width = length, screen_height = width
#
# TTF widgets: MUST set both width AND height for proper centering
#   and alignment.  Set reload 1 for dynamic expressions.
# ---------------------------------------------------------------

# Background image
Widget Background {
    class 'Image'
    file 'themes/SimpleRed/background.png'
    reload 0
    update 0
    visible 1
}

# ---------------------------------------------------------------
# Section 1: CPU Percentage (rows 0-119)
# ---------------------------------------------------------------

# Big CPU % number — black text on the colored box
Widget CPU_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update tick
}

# "% CPU" label — light grey on black, right side
Widget CPU_Label_TTF {
    class 'Truetype'
    expression '%  CPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'cccccc'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}

# CPU model text
Widget CPU_Model_TTF {
    class 'Truetype'
    expression cpuinfo('model name')
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff2325'
    size 10
    align 'L'
    width 150
    height 16
    update 0
}

# CPU graphicbar
# CPU_GBar border — ff2325 outline
Widget CPU_GBar_Border {
    class 'graphicbar'
    expression 100
    color 'ff2325'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget CPU_GBar {
    class 'graphicbar'
    expression proc_stat::cpu('busy', 500)
    color 'ff2325'
    colorhigh 'ff2325'
    colorlow 'ff2325'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update tack
}

# ---------------------------------------------------------------
# Section 2: RAM Percentage (rows 120-239)
# ---------------------------------------------------------------

# Big RAM % number — black text on colored box
Widget RAM_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100, 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update tick
}

# "% RAM" label
Widget RAM_Label_TTF {
    class 'Truetype'
    expression '%  RAM'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'cccccc'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}

# RAM info text
Widget RAM_Model_TTF {
    class 'Truetype'
    expression precision(meminfo('MemTotal')/1024, 0).' MB'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff2325'
    size 10
    align 'L'
    width 150
    height 16
    update 0
}

# RAM graphicbar
# RAM_GBar border — ff2325 outline
Widget RAM_GBar_Border {
    class 'graphicbar'
    expression 100
    color 'ff2325'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget RAM_GBar {
    class 'graphicbar'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    color 'ff2325'
    colorhigh 'ff2325'
    colorlow 'ff2325'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update tack
}

# ---------------------------------------------------------------
# Section 3: GPU / System Load (rows 240-359)
# Since there's no GPU plugin, we use system load as a proxy
# ---------------------------------------------------------------

# Big number — black text on colored box
Widget GPU_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('system', 500), 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update tick
}

# "% GPU" label (shows system load as GPU proxy)
Widget GPU_Label_TTF {
    class 'Truetype'
    expression '%  GPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'cccccc'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}

# GPU model text
Widget GPU_Model_TTF {
    class 'Truetype'
    expression exec('/usr/bin/lspci 2>/dev/null | grep -i vga | sed "s/.*: //"', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff2325'
    size 10
    align 'L'
    width 150
    height 16
    reload 1
    update 5000
}

# GPU graphicbar
# GPU_GBar border — ff2325 outline
Widget GPU_GBar_Border {
    class 'graphicbar'
    expression 100
    color 'ff2325'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget GPU_GBar {
    class 'graphicbar'
    expression proc_stat::cpu('system', 500)
    color 'ff2325'
    colorhigh 'ff2325'
    colorlow 'ff2325'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update tack
}

# ---------------------------------------------------------------
# Section 4: CPU Temperature (rows 360-479)
# Using thermal_zone4 (x86_pkg_temp) — zone0 returns garbage
# ---------------------------------------------------------------

# Big temp number — black on colored box
Widget TEMP_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp', 10000) / 1000, 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update 5000
}

# "°C CPU" label
Widget TEMP_Label_TTF {
    class 'Truetype'
    expression '°C CPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'cccccc'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}

# CPU model text (bottom section)
Widget TEMP_Model_TTF {
    class 'Truetype'
    expression cpuinfo('model name')
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff2325'
    size 10
    align 'L'
    width 150
    height 16
    update 0
}

# Temperature graphicbar
# TEMP_GBar border — ff2325 outline
Widget TEMP_GBar_Border {
    class 'graphicbar'
    expression 100
    color 'ff2325'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget TEMP_GBar {
    class 'graphicbar'
    expression exec('cat /sys/class/thermal/thermal_zone4/temp', 10000) / 1000
    color 'ff2325'
    colorhigh 'ff2325'
    colorlow 'ff2325'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update 5000
}

# ---------------------------------------------------------------
Display 'DPF'

Layout layout_simplered {
    # Layer 1: Foreground — TTF widgets and graphicbars (lower index = on top)
    #
    # Coordinate mapping: X = row (vertical), Y = col (horizontal)
    # Theme (horiz, vert) -> Config X{vert+1}.Y{horiz+1}
    Layer 1 {
        # --- Section 1: CPU % (rows 0-119) ---
        X16.Y6     'CPU_TTF'
        X11.Y171   'CPU_Label_TTF'
        X47.Y171   'CPU_Model_TTF'
        X65.Y171 'CPU_GBar_Border'

        X66.Y172 'CPU_GBar'

        # --- Section 2: RAM % (rows 120-239) ---
        X131.Y6    'RAM_TTF'
        X126.Y171  'RAM_Label_TTF'
        X165.Y171  'RAM_Model_TTF'
        X183.Y171 'RAM_GBar_Border'

        X184.Y172 'RAM_GBar'

        # --- Section 3: GPU % (rows 240-359) ---
        X251.Y6    'GPU_TTF'
        X246.Y171  'GPU_Label_TTF'
        X283.Y171  'GPU_Model_TTF'
        X301.Y171 'GPU_GBar_Border'

        X302.Y172 'GPU_GBar'

        # --- Section 4: CPU Temp (rows 360-479) ---
        X371.Y6    'TEMP_TTF'
        X363.Y171  'TEMP_Label_TTF'
        X403.Y171  'TEMP_Model_TTF'
        X421.Y171 'TEMP_GBar_Border'

        X422.Y172 'TEMP_GBar'
    }

    # Layer 2: Background image (higher index = behind)
    Layer 2 {
        X1.Y1 'Background'
    }
}

Layout 'layout_simplered'

Variables {
    backlight 7
    tick 1000
    tack 500
}
