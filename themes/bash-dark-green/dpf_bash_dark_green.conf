# Theme design: @turing-smart-screen-python (bash-dark-green)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
# Network interfaces: search-replace 'wlan0' / 'eth0' to match your system
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 1
    Backlight  backlight
}

# ---------------------------------------------------------------
# bash-dark-green theme — 320x480 portrait
# 5 zones: Date/Time (top bar), CPU (top-left), RAM (top-right),
#           Network (middle), Disk (bottom)
# ---------------------------------------------------------------

Widget Background {
    class 'Image'
    file 'themes/bash-dark-green/background.png'
    reload 0
    update 0
    visible 1
}

# --- Zone 1: Date / Time (top bar) ---
Widget Date_TTF {
    class 'Truetype'
    expression strftime('%b %-d, %Y', time())
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 12
    align 'L'
    width 120
    height 18
    update tick
}
Widget Time_TTF {
    class 'Truetype'
    expression strftime('%l:%M:%S %p', time())
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 12
    align 'R'
    width 110
    height 18
    update tick
}

# --- Zone 2: CPU Info (top-left) ---
Widget CPU_Freq_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq 2>/dev/null || echo 0', 5000) / 1000000, 2).' GHz'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 8
    align 'L'
    width 50
    height 14
    reload 1
    update 5000
}
Widget CPU_Temp_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp 2>/dev/null | head -1 || echo 0', 5000) / 1000, 0).'°C'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 10
    align 'L'
    width 40
    height 14
    reload 1
    update 5000
}
Widget CPU_Gauge {
    class 'Gauge'
    expression proc_stat::cpu('busy', 500)
    width 66
    height 66
    min 0
    max 100
    start 180
    sweep 360
    thickness 5
    color '35bf5c'
    background '000000ff'
    update tack
    direction 'CCW'
}
Widget CPU_Pct_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0)
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 20
    align 'C'
    width 66
    height 26
    reload 1
    update tick
}

# --- Zone 3: RAM Info (top-right) ---
Widget RAM_Used_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / 1024, 0).' M'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 10
    align 'L'
    width 70
    height 14
    reload 1
    update tick
}
Widget RAM_Avail_TTF {
    class 'Truetype'
    expression precision(meminfo('MemAvailable') / 1024, 0).' M'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 8
    align 'L'
    width 60
    height 14
    reload 1
    update tick
}
Widget RAM_Gauge {
    class 'Gauge'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    width 66
    height 66
    min 0
    max 100
    start 180
    sweep 360
    thickness 5
    color '35bf5c'
    background '000000ff'
    update tack
    direction 'CCW'
}
Widget RAM_Pct_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100, 0)
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 20
    align 'C'
    width 66
    height 26
    reload 1
    update tick
}

# --- Zone 4: Network (middle) ---
# Wi-Fi
Widget NET_WLO_DL_TTF {
    class 'Truetype'
    expression precision(netdev(wlan_if, 'Rx_bytes', 1000) / 1024, 1).' KB/s'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 10
    align 'L'
    width 72
    height 14
    reload 1
    update tick
}
Widget NET_WLO_DLTotal_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/net/' . wlan_if . '/statistics/rx_bytes 2>/dev/null || echo 0', 1000) / 1024 / 1024, 1).' M'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 10
    align 'L'
    width 72
    height 14
    reload 1
    update tick
}
Widget NET_WLO_UL_TTF {
    class 'Truetype'
    expression precision(netdev(wlan_if, 'Tx_bytes', 1000) / 1024, 1).' KB/s'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 10
    align 'L'
    width 72
    height 14
    reload 1
    update tick
}
Widget NET_WLO_ULTotal_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/net/' . wlan_if . '/statistics/tx_bytes 2>/dev/null || echo 0', 1000) / 1024 / 1024, 1).' M'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 10
    align 'L'
    width 72
    height 14
    reload 1
    update tick
}
# Ethernet
Widget NET_ETH_DL_TTF {
    class 'Truetype'
    expression precision(netdev(eth_if, 'Rx_bytes', 1000) / 1024, 1).' KB/s'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 10
    align 'L'
    width 72
    height 14
    reload 1
    update tick
}
Widget NET_ETH_DLTotal_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/net/' . eth_if . '/statistics/rx_bytes 2>/dev/null || echo 0', 1000) / 1024 / 1024, 1).' M'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 10
    align 'L'
    width 72
    height 14
    reload 1
    update tick
}
Widget NET_ETH_UL_TTF {
    class 'Truetype'
    expression precision(netdev(eth_if, 'Tx_bytes', 1000) / 1024, 1).' KB/s'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 10
    align 'L'
    width 72
    height 14
    reload 1
    update tick
}
Widget NET_ETH_ULTotal_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/net/' . eth_if . '/statistics/tx_bytes 2>/dev/null || echo 0', 1000) / 1024 / 1024, 1).' M'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 10
    align 'L'
    width 72
    height 14
    reload 1
    update tick
}

# --- Zone 5: Disk Info (bottom) ---
Widget Disk_Gauge {
    class 'Gauge'
    expression (1 - statfs('/', 'bavail') / statfs('/', 'blocks')) * 100
    width 66
    height 66
    min 0
    max 100
    start 180
    sweep 360
    thickness 5
    color '35bf5c'
    background '000000ff'
    update 10000
    direction 'CCW'
}
Widget Disk_Pct_TTF {
    class 'Truetype'
    expression precision((1 - statfs('/', 'bavail') / statfs('/', 'blocks')) * 100, 0)
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 20
    align 'C'
    width 66
    height 26
    reload 1
    update 10000
}
Widget Disk_Used_TTF {
    class 'Truetype'
    expression precision((statfs('/', 'blocks') - statfs('/', 'bavail')) * statfs('/', 'bsize') / 1024 / 1024 / 1024, 0).' G'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 14
    align 'L'
    width 90
    height 18
    reload 1
    update 10000
}
Widget Disk_Total_TTF {
    class 'Truetype'
    expression precision(statfs('/', 'blocks') * statfs('/', 'bsize') / 1024 / 1024 / 1024, 0).' G'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 14
    align 'L'
    width 90
    height 18
    reload 1
    update 10000
}
Widget Disk_Free_TTF {
    class 'Truetype'
    expression precision(statfs('/', 'bavail') * statfs('/', 'bsize') / 1024 / 1024 / 1024, 0).' G'
    font 'fonts/roboto-mono/RobotoMono-Regular.ttf'
    fcolor '35bf5c'
    background '00000000'
    size 14
    align 'L'
    width 90
    height 18
    reload 1
    update 10000
}

# ---------------------------------------------------------------
# Layout — 320x480 portrait via Orientation 1
# Coordinate mapping: Layout X = theme Y, Layout Y = theme X
# ---------------------------------------------------------------
Layout layout_bash_dark_green {
    Layer 0 {
        # Gauge percentage text (drawn on top of gauges)
        X110.Y67    'CPU_Pct_TTF'
        X126.Y237   'RAM_Pct_TTF'
        X416.Y49    'Disk_Pct_TTF'
    }
    Layer 1 {
        # Zone 1: Date/Time
        X8.Y6       'Date_TTF'
        X8.Y165     'Time_TTF'
        # Zone 2: CPU
        X100.Y8     'CPU_Freq_TTF'
        X148.Y8     'CPU_Temp_TTF'
        X90.Y67     'CPU_Gauge'
        # Zone 3: RAM
        X99.Y178    'RAM_Used_TTF'
        X148.Y178   'RAM_Avail_TTF'
        X106.Y237   'RAM_Gauge'
        # Zone 4: Network — Wi-Fi (left)
        X265.Y4     'NET_WLO_DL_TTF'
        X265.Y90    'NET_WLO_DLTotal_TTF'
        X315.Y4     'NET_WLO_UL_TTF'
        X315.Y90    'NET_WLO_ULTotal_TTF'
        # Zone 4: Network — Ethernet (right)
        X265.Y165   'NET_ETH_DLTotal_TTF'
        X265.Y244   'NET_ETH_DL_TTF'
        X315.Y165   'NET_ETH_ULTotal_TTF'
        X315.Y244   'NET_ETH_UL_TTF'
        # Zone 5: Disk
        X396.Y49    'Disk_Gauge'
        X394.Y144   'Disk_Used_TTF'
        X394.Y230   'Disk_Total_TTF'
        X443.Y144   'Disk_Free_TTF'
    }
    Layer 2 {
        X1.Y1 'Background'
    }
}

Display 'DPF'

Layout 'layout_bash_dark_green'

Variables {
    backlight 7
    tick 1000
    tack 500
    eth_if 'eno1'
    wlan_if 'wlp0s20f3'
}
