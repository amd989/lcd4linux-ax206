# Theme design: @takattila (turing-smart-screen-python)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 1
    Backlight  backlight
}

# ---------------------------------------------------------------
# SimpleRedGauge theme — 320x480 portrait
# 5 zones: CPU info (top-left), GPU info (top-right),
#           CPU % gauge (center circle), RAM info (bottom-left),
#           SSD/NET info (bottom-right)
# ---------------------------------------------------------------

Widget Background {
    class 'Image'
    file 'themes/SimpleRedGauge/background.png'
    reload 0
    update 0
    visible 1
}

# --- Zone 1: CPU Info (top-left) ---
Widget CPU_Label_TTF {
    class 'Truetype'
    expression 'CPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff1e00'
    size 22
    align 'C'
    width 130
    height 26
    update 0
}
Widget CPU_Temp_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp', 10000) / 1000, 0).'°C'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 32
    align 'C'
    width 155
    height 40
    reload 1
    update 5000
}
# CPU_TempBar border — ff1e00 outline
Widget CPU_TempBar_Border {
    class 'graphicbar'
    expression 100
    color 'ff1e00'
    background '000000'
    style 'H'
    max 100
    length 105
    width 20
    direction 'E'
    update 0
}

Widget CPU_TempBar {
    class 'graphicbar'
    expression exec('cat /sys/class/thermal/thermal_zone4/temp', 10000) / 1000
    color 'ff1e00'
    colorhigh 'ff1e00'
    colorlow 'ff1e00'
    background '000000'
    max 100
    length 103
    width 18
    direction 'E'
    update 5000
}
Widget CPU_Freq_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq', 60000) / 1000000, 2).' GHZ'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 12
    align 'C'
    width 105
    height 16
    reload 1
    update 5000
}

# --- Zone 2: GPU Info (top-right) ---
Widget GPU_Label_TTF {
    class 'Truetype'
    expression 'GPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff1e00'
    size 22
    align 'C'
    width 130
    height 26
    update 0
}
Widget GPU_Pct_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('system', 500), 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 32
    align 'C'
    width 145
    height 40
    reload 1
    update tick
}
# GPU_PctBar border — ff1e00 outline
Widget GPU_PctBar_Border {
    class 'graphicbar'
    expression 100
    color 'ff1e00'
    background '000000'
    style 'H'
    max 100
    length 105
    width 20
    direction 'E'
    update 0
}

Widget GPU_PctBar {
    class 'graphicbar'
    expression proc_stat::cpu('system', 500)
    color 'ff1e00'
    colorhigh 'ff1e00'
    colorlow 'ff1e00'
    background '000000'
    max 100
    length 103
    width 18
    direction 'E'
    update tack
}
Widget GPU_Freq_TTF {
    class 'Truetype'
    expression 'LOAD '  . precision(loadavg(1), 2)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 12
    align 'C'
    width 105
    height 16
    reload 1
    update tick
}

# --- Zone 3: CPU % Gauge (center circle) ---
Widget CPU_Pct_Big_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    background '00000000'
    size 50
    align 'C'
    width 190
    height 60
    reload 1
    update tick
}
Widget CPU_Gauge {
    class 'Gauge'
    expression proc_stat::cpu('busy', 500)
    width 190
    height 190
    min 0
    max 100
    start 180
    sweep 360
    thickness 0
    color 'ff9999'
    background 'ff1e00'
    update tack
    direction 'CCW'
}

# --- Zone 4: RAM Info (bottom-left) ---
Widget RAM_Label_TTF {
    class 'Truetype'
    expression 'RAM'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff1e00'
    size 22
    align 'C'
    width 130
    height 26
    update 0
}
Widget RAM_Pct_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100, 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 32
    align 'C'
    width 150
    height 40
    reload 1
    update tick
}
# RAM_Bar border — ff1e00 outline
Widget RAM_Bar_Border {
    class 'graphicbar'
    expression 100
    color 'ff1e00'
    background '000000'
    style 'H'
    max 100
    length 105
    width 20
    direction 'E'
    update 0
}

Widget RAM_Bar {
    class 'graphicbar'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    color 'ff1e00'
    colorhigh 'ff1e00'
    colorlow 'ff1e00'
    background '000000'
    max 100
    length 103
    width 18
    direction 'E'
    update tack
}
Widget RAM_Used_Label_TTF {
    class 'Truetype'
    expression 'USED'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff1e00'
    size 10
    align 'L'
    width 38
    height 13
    update 0
}
Widget RAM_Used_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / 1024, 0).' M'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 11
    align 'L'
    width 95
    height 14
    reload 1
    update tick
}
Widget RAM_Free_Label_TTF {
    class 'Truetype'
    expression 'FREE'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff1e00'
    size 10
    align 'L'
    width 38
    height 13
    update 0
}
Widget RAM_Free_TTF {
    class 'Truetype'
    expression precision(meminfo('MemAvailable') / 1024, 0).' M'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 11
    align 'L'
    width 95
    height 14
    reload 1
    update tick
}

# --- Zone 5: SSD/NET Info (bottom-right) ---
Widget DISK_Label_TTF {
    class 'Truetype'
    expression 'SSD/NET'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff1e00'
    size 22
    align 'C'
    width 140
    height 26
    update 0
}
Widget DISK_Pct_TTF {
    class 'Truetype'
    expression precision((1 - 1.0 * statfs('/', 'bavail') / statfs('/', 'blocks')) * 100, 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 32
    align 'C'
    width 145
    height 40
    reload 1
    update 10000
}
Widget NET_Upload_TTF {
    class 'Truetype'
    expression precision(netdev('eno1', 'Tx_bytes', 500) / 1048576, 1).' M/S'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff1e00'
    size 16
    align 'L'
    width 145
    height 20
    reload 1
    update tick
}
Widget NET_Download_TTF {
    class 'Truetype'
    expression precision(netdev('eno1', 'Rx_bytes', 500) / 1048576, 1).' M/S'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ff1e00'
    size 16
    align 'L'
    width 145
    height 20
    reload 1
    update tick
}

# ---------------------------------------------------------------
Display 'DPF'

Layout layout_simpleredgauge {
    Layer 0 {
        # --- Zone 3: CPU % text overlay (transparent bg over gauge) ---
        X206.Y71    'CPU_Pct_Big_TTF'
    }
    Layer 1 {
        # --- Zone 1: CPU Info (top-left) ---
        X11.Y11     'CPU_Label_TTF'
        X46.Y1      'CPU_Temp_TTF'
        X91.Y29 'CPU_TempBar_Border'

        X92.Y30 'CPU_TempBar'
        X121.Y39    'CPU_Freq_TTF'
        # --- Zone 2: GPU Info (top-right) ---
        X11.Y181    'GPU_Label_TTF'
        X46.Y176    'GPU_Pct_TTF'
        X91.Y191 'GPU_PctBar_Border'

        X92.Y192 'GPU_PctBar'
        X121.Y201   'GPU_Freq_TTF'
        # --- Zone 3: CPU % Gauge (center) ---
        X146.Y70    'CPU_Gauge'
        # --- Zone 4: RAM Info (bottom-left) ---
        X351.Y11    'RAM_Label_TTF'
        X381.Y11    'RAM_Pct_TTF'
        X421.Y29 'RAM_Bar_Border'

        X422.Y30 'RAM_Bar'
        X447.Y28    'RAM_Used_Label_TTF'
        X446.Y66    'RAM_Used_TTF'
        X463.Y28    'RAM_Free_Label_TTF'
        X461.Y66    'RAM_Free_TTF'
        # --- Zone 5: SSD/NET Info (bottom-right) ---
        X351.Y181   'DISK_Label_TTF'
        X381.Y176   'DISK_Pct_TTF'
        X431.Y176   'NET_Upload_TTF'
        X456.Y176   'NET_Download_TTF'
    }
    Layer 2 {
        X1.Y1 'Background'
    }
}

Layout 'layout_simpleredgauge'

Variables {
    backlight 7
    tick 1000
    tack 500
}
