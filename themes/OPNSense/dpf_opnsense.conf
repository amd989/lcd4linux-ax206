# Theme: OPNSense
# Theme design: @amd989 
# lcd4linux config: @amd989
# License: MIT
# Target: 320x480 Portrait (DPF)
# Font: Source Sans 3

Display dpf {
    Driver 'DPF'
    Port 'usb0'
    Font '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor '1a1a1a'
    Orientation 1
    Backlight backlight
}


# ---------------------------------------------------------------
# Variables
# ---------------------------------------------------------------
Variables {
    backlight 7
    tick 1000
    tack 500
    net_if 'eth0'
    wlan_if 'wlan0'
    vpn_if 'tun0'
}


# ---------------------------------------------------------------
# Background
# ---------------------------------------------------------------
Widget Background {
    class 'Image'
    file 'themes/OPNSense/Background.png'
    reload 0
    update 0
    visible 1
}


# ---------------------------------------------------------------
# Header: Time & Date
# ---------------------------------------------------------------
Widget Time {
    class 'Truetype'
    expression strftime('%H:%M', time())
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'ffffff'
    size 28
    align 'C'
    width 100
    height 40
    reload 1
    update 1000
}


Widget TimeAmPm {
    class 'Truetype'
    expression strftime('%p', time())
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 10
    align 'L'
    width 30
    height 15
    reload 1
    update 1000
}


Widget Date {
    class 'Truetype'
    expression strftime('%A, %b %d', time())
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 12
    align 'C'
    width 180
    height 20
    reload 1
    update 60000
}


# ---------------------------------------------------------------
# Section 1: Internet
# ---------------------------------------------------------------
Widget Internet_Title {
    class 'Truetype'
    expression 'Internet'
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'ffffff'
    size 12
    align 'L'
    width 70
    height 15
    update 0
}


Widget Internet_Status {
    class 'Truetype'
    expression exec('ping -c 1 -W 1 1.1.1.1 >/dev/null 2>&1 && echo Connected || echo Not Connected', 10000)
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor 'f97316'
    size 10
    align 'L'
    width 80
    height 15
    reload 1
    update 10000
}


Widget Net_Down_Val {
    class 'Truetype'
    expression precision(netdev(net_if, 'Rx_bytes', 500) / 125000, 1)
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'ffffff'
    size 14
    align 'R'
    width 50
    height 20
    reload 1
    update tack
}


Widget Net_Up_Val {
    class 'Truetype'
    expression precision(netdev(net_if, 'Tx_bytes', 500) / 125000, 1)
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'ffffff'
    size 14
    align 'R'
    width 50
    height 20
    reload 1
    update tack
}


Widget Net_Unit {
    class 'Truetype'
    expression 'Mbps'
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 9
    align 'R'
    width 35
    height 20
    update 0
}


Widget Net_Sparkline {
    class 'Sparkline'
    expression netdev(net_if, 'Rx_bytes', 500) + netdev(net_if, 'Tx_bytes', 500)
    width 60
    length 290
    samples 60
    color 'f97316'
    background '000000ff'
    update tack
}


# ---------------------------------------------------------------
# Section 2: Devices (Left)
# ---------------------------------------------------------------
Widget Devices_Title {
    class 'Truetype'
    expression 'Devices'
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'ffffff'
    size 12
    align 'L'
    width 55
    height 15
    update 0
}


Widget Devices_Count {
    class 'Truetype'
    expression exec('ip -4 neigh show 2>/dev/null | grep -cv FAILED || arp -an 2>/dev/null | wc -l', 30000)
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'f97316'
    size 10
    align 'R'
    width 25
    height 15
    reload 1
    update 30000
}


Widget LAN_Count {
    class 'Truetype'
    expression exec('arp -i ' . net_if . ' -an 2>/dev/null | wc -l', 30000)
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'ffffff'
    size 10
    align 'C'
    width 25
    height 15
    reload 1
    update 30000
}


Widget WLAN_Count {
    class 'Truetype'
    expression exec('arp -i ' . wlan_if . ' -an 2>/dev/null | wc -l', 30000)
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'ffffff'
    size 10
    align 'C'
    width 25
    height 15
    reload 1
    update 30000
}


Widget VPN_Count {
    class 'Truetype'
    expression exec('arp -i ' . vpn_if . ' -an 2>/dev/null | wc -l', 30000)
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'ffffff'
    size 10
    align 'C'
    width 25
    height 15
    reload 1
    update 30000
}


Widget LAN_Label {
    class 'Truetype'
    expression 'LAN'
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 7
    align 'C'
    width 25
    height 10
    update 0
}


Widget WLAN_Label {
    class 'Truetype'
    expression 'WLAN'
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 7
    align 'C'
    width 30
    height 10
    update 0
}


Widget VPN_Label {
    class 'Truetype'
    expression 'VPN'
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 7
    align 'C'
    width 25
    height 10
    update 0
}


# ---------------------------------------------------------------
# Section 3: System (Right)
# ---------------------------------------------------------------
Widget System_Title {
    class 'Truetype'
    expression 'System'
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'ffffff'
    size 12
    align 'L'
    width 55
    height 15
    update 0
}


Widget CPU_Label {
    class 'Truetype'
    expression 'CPU'
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 8
    align 'L'
    width 30
    height 12
    update 0
}


Widget CPU_Val {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0).'%'
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'f97316'
    size 9
    align 'R'
    width 35
    height 12
    reload 1
    update tack
}


Widget CPU_Bar {
    class 'GraphicBar'
    expression proc_stat::cpu('busy', 500)
    length 125
    width 4
    direction 'E'
    color 'f97316'
    background '333333'
    update tack
    max 100
}


Widget MEM_Label {
    class 'Truetype'
    expression 'MEM'
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 8
    align 'L'
    width 30
    height 12
    update 0
}


Widget MEM_Val {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100, 0).'%'
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'f97316'
    size 9
    align 'R'
    width 35
    height 12
    reload 1
    update tick
}


Widget MEM_Bar {
    class 'GraphicBar'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    length 125
    width 4
    direction 'E'
    color 'f97316'
    background '333333'
    min 0
    max 100
    update tick
}


Widget TEMP_Label {
    class 'Truetype'
    expression 'TEMP'
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 8
    align 'L'
    width 30
    height 12
    update 0
}


Widget TEMP_Val {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp 2>/dev/null || echo 46000', 10000) / 1000, 0).'°C'
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'f97316'
    size 9
    align 'R'
    width 35
    height 12
    reload 1
    update 5000
}


Widget TEMP_Bar {
    class 'GraphicBar'
    expression exec('cat /sys/class/thermal/thermal_zone4/temp 2>/dev/null || echo 46000', 10000) / 1000
    length 125
    width 4
    direction 'E'
    color 'f97316'
    colorhigh 'f59e0b'
    background '333333'
    max 100
    update 5000
}


# ---------------------------------------------------------------
# Section 4: Firewall
# ---------------------------------------------------------------
Widget Firewall_Title {
    class 'Truetype'
    expression 'Firewall'
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'ffffff'
    size 12
    align 'L'
    width 55
    height 15
    update 0
}


Widget PPS_Label {
    class 'Truetype'
    expression 'PPS'
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 7
    align 'C'
    width 40
    height 12
    update 0
}


Widget PPS_Val {
    class 'Truetype'
    # Packets per second (Rx+Tx) on the primary interface
    expression precision(netdev(net_if, 'Rx_packets', 500) + netdev(net_if, 'Tx_packets', 500), 0)
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'f97316'
    size 10
    align 'C'
    width 40
    height 15
    reload 1
    update tick
}


Widget CONN_Label {
    class 'Truetype'
    expression 'CONN'
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 7
    align 'C'
    width 40
    height 12
    update 0
}


Widget CONN_Val {
    class 'Truetype'
    # Active TCP connections
    # OPNsense: exec('pfctl -si 2>/dev/null | grep "current entries" | grep -oE "[0-9]+" | head -1', 5000)
    expression exec('ss -t state established 2>/dev/null | tail -n +2 | wc -l', 5000)
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'f97316'
    size 10
    align 'C'
    width 40
    height 15
    reload 1
    update 5000
}


Widget BLOCK_Label {
    class 'Truetype'
    expression 'BLOCK'
    font 'fonts/source-sans-3/SourceSans3-Regular.ttf'
    fcolor '999999'
    size 7
    align 'C'
    width 50
    height 12
    update 0
}


Widget BLOCK_Val {
    class 'Truetype'
    # Tracked connections (conntrack) or firewall state count
    # OPNsense: exec('pfctl -vsr 2>/dev/null | grep -c block', 10000)
    expression exec('cat /proc/sys/net/netfilter/nf_conntrack_count 2>/dev/null || echo 0', 10000)
    font 'fonts/source-sans-3/SourceSans3-Bold.ttf'
    fcolor 'f59e0b'
    size 10
    align 'C'
    width 60
    height 15
    reload 1
    update 10000
}


Widget FW_Sparkline {
    class 'Sparkline'
    expression netdev(net_if, 'Rx_packets', 500) + netdev(net_if, 'Tx_packets', 500)
    width 46
    length 290
    color 'f97316'
    background '000000ff'
    update tack
}


# ---------------------------------------------------------------
# Layout
# ---------------------------------------------------------------
Layout layout_opnsense {
    Layer 1 {
        X5.Y110 'Time'
        X30.Y210 'TimeAmPm'
        X45.Y70 'Date'
        X86.Y37 'Internet_Title'
        X87.Y235 'Internet_Status'
        X112.Y15 'Net_Down_Val'
        X112.Y75 'Net_Up_Val'
        X112.Y128 'Net_Unit'
        X132.Y16 'Net_Sparkline'
        X214.Y37 'Devices_Title'
        X214.Y125 'Devices_Count'
        X277.Y27 'LAN_Count'
        X295.Y27 'LAN_Label'
        X277.Y72 'WLAN_Count'
        X295.Y70 'WLAN_Label'
        X277.Y115 'VPN_Count'
        X295.Y115 'VPN_Label'
        X214.Y192 'System_Title'
        X235.Y174 'CPU_Label'
        X235.Y265 'CPU_Val'
        X255.Y175 'CPU_Bar'
        X271.Y175 'MEM_Label'
        X271.Y266 'MEM_Val'
        X291.Y175 'MEM_Bar'
        X307.Y175 'TEMP_Label'
        X307.Y266 'TEMP_Val'
        X327.Y175 'TEMP_Bar'
        X362.Y37 'Firewall_Title'
        X383.Y47 'PPS_Label'
        X399.Y47 'PPS_Val'
        X382.Y141 'CONN_Label'
        X399.Y141 'CONN_Val'
        X383.Y232 'BLOCK_Label'
        X400.Y227 'BLOCK_Val'
        X422.Y15 'FW_Sparkline'
    }
    Layer 2 {
        X1.Y1 'Background'
    }
}


Display 'dpf'

Layout 'layout_opnsense'

Mirror 'VNC'


Display VNC {
    Driver 'VNC'
    Font '6x8'
    Port '5900'
    Xres '320'
    Yres '480'
    Bpp '4'
    Maxclients '2'
    Osd_showtime '2000'
}