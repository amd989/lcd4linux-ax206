# ---------------------------------------------------------------
Display 'DPF'

Layout layout_simplewhitenas {
    Layer 1 {
        # --- Section 1: SDA (rows 0-119) ---
        X16.Y6     'SDA_TTF'
        X11.Y171   'SDA_Label_TTF'
        X47.Y171   'SDA_Size_TTF'
        X65.Y171   'SDA_GBar_Border'
        X66.Y172   'SDA_GBar'

        # --- Section 2: SDB (rows 120-239) ---
        X131.Y6    'SDB_TTF'
        X126.Y171  'SDB_Label_TTF'
        X165.Y171  'SDB_Size_TTF'
        X183.Y171  'SDB_GBar_Border'
        X184.Y172  'SDB_GBar'

        # --- Section 3: SDC (rows 240-359) ---
        X251.Y6    'SDC_TTF'
        X246.Y171  'SDC_Label_TTF'
        X283.Y171  'SDC_Size_TTF'
        X301.Y171  'SDC_GBar_Border'
        X302.Y172  'SDC_GBar'

        # --- Section 4: SDD (rows 360-479) ---
        X371.Y6    'SDD_TTF'
        X363.Y169  'SDD_Label_TTF'
        X403.Y171  'SDD_Size_TTF'
        X421.Y171  'SDD_GBar_Border'
        X422.Y172  'SDD_GBar'
    }

    Layer 2 {
        X1.Y1 'Background'
    }
}

Layout 'layout_simplewhitenas'

Variables {
    backlight 7
    tick 1000
    tack 500
}
