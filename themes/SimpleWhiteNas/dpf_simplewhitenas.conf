# Theme design: @takattila (turing-smart-screen-python)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
# SimpleWhiteNas — 4-bay NAS drive monitor
# Each section shows one drive: usage %, bar, label, total size
#
# IMPORTANT: Adjust /dev/sdX1 paths below to match your NAS drives.
# You can also use mount points like /mnt/data1, /srv/storage, etc.
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 3
    Backlight  backlight
}

# ---------------------------------------------------------------
# SimpleWhiteNas theme — 320x480 portrait
# 4 sections: SDA%, SDB%, SDC%, SDD%
#
# COORDINATE MAPPING for portrait mode (Orientation 3):
#   Layout X<n> = vertical position (row), top=1 to bottom=480
#   Layout Y<n> = horizontal position (col), left=1 to right=320
#   Theme YAML X (horizontal) → Layout Y
#   Theme YAML Y (vertical)   → Layout X
#
# Graphicbar direction 'E' fills left-to-right on portrait screen.
#   For 'E': screen_width = length, screen_height = width
#
# TTF widgets: MUST set both width AND height for proper centering
#   and alignment.  Set reload 1 for dynamic expressions.
# ---------------------------------------------------------------

# Background image
Widget Background {
    class 'Image'
    file 'themes/SimpleWhite/background.png'
    reload 0
    update 0
    visible 1
}

# ---------------------------------------------------------------
# Section 1: SDA (rows 0-119)
# ---------------------------------------------------------------

# Big usage % number
Widget SDA_TTF {
    class 'Truetype'
    expression exec('df --output=pcent /dev/sda2 2>/dev/null | tail -1 | tr -dc 0-9', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update 60000
}

# "% SDA" label
Widget SDA_Label_TTF {
    class 'Truetype'
    expression '%  SDA'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}

# SDA used/total — small text, right-aligned
Widget SDA_Size_TTF {
    class 'Truetype'
    expression exec('df -h --output=used,size /dev/sda2 2>/dev/null | tail -1 | xargs | sed "s# #/#"', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 10
    align 'R'
    width 150
    height 16
    reload 1
    update 60000
}

# SDA graphicbar border
Widget SDA_GBar_Border {
    class 'graphicbar'
    expression 100
    color '000000'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

# SDA graphicbar fill
Widget SDA_GBar {
    class 'graphicbar'
    expression exec('df --output=pcent /dev/sda2 2>/dev/null | tail -1 | tr -dc 0-9', 60000) + 0
    color 'ffffff'
    colorhigh 'ffffff'
    colorlow 'ffffff'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update 60000
}

