# Theme design: @takattila (turing-smart-screen-python)
# lcd4linux config: @amd989
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 1
    Backlight  backlight
}

# ---------------------------------------------------------------
# SimpleYellowGauge theme — 320x480 portrait
# 5 zones: CPU info (top-left), GPU info (top-right),
#           CPU % gauge (center circle), RAM info (bottom-left),
#           SSD/NET info (bottom-right)
#
# COORDINATE MAPPING for portrait mode (Orientation 1):
#   Layout X{n} = theme_Y + 1  (vertical position, top to bottom)
#   Layout Y{n} = theme_X + 1  (horizontal position, left to right)
#
# The background has 4 corner rectangles and a large yellow circle
# in the center. We overlay text/bars on the black rectangles and
# put the big CPU% on the yellow circle.
# ---------------------------------------------------------------

Widget Background {
    class 'Image'
    file 'themes/SimpleYellowGauge/background.png'
    reload 0
    update 0
    visible 1
}

# ---------------------------------------------------------------
# Zone 1: CPU Info (top-left box, ~theme X:0-155, Y:0-145)
# Shows: "CPU" label, temperature, temp bar, frequency
# ---------------------------------------------------------------

# "CPU" label — yellow text
Widget CPU_Label_TTF {
    class 'Truetype'
    expression 'CPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffe400'
    size 22
    align 'C'
    width 130
    height 26
    update 0
}

# CPU temperature — white, large, with degree symbol
Widget CPU_Temp_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/class/thermal/thermal_zone4/temp', 10000) / 1000, 0).'°C'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 32
    align 'C'
    width 155
    height 40
    reload 1
    update 5000
}

# CPU temperature bar — yellow
# CPU_TempBar border — ffe400 outline
Widget CPU_TempBar_Border {
    class 'graphicbar'
    expression 100
    color 'ffe400'
    background '000000'
    style 'H'
    max 100
    length 105
    width 20
    direction 'E'
    update 0
}

Widget CPU_TempBar {
    class 'graphicbar'
    expression exec('cat /sys/class/thermal/thermal_zone4/temp', 10000) / 1000
    color 'ffe400'
    colorhigh 'ffe400'
    colorlow 'ffe400'
    background '000000'
    max 100
    length 103
    width 18
    direction 'E'
    update 5000
}

# CPU frequency — white, small
Widget CPU_Freq_TTF {
    class 'Truetype'
    expression precision(exec('cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq', 60000) / 1000000, 2).' GHZ'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 12
    align 'C'
    width 105
    height 16
    reload 1
    update 5000
}

# ---------------------------------------------------------------
# Zone 2: GPU Info (top-right box, ~theme X:165-320, Y:0-145)
# Shows: "GPU" label, percentage, GPU bar, frequency
# Since there's no GPU plugin, we use system CPU as proxy
# ---------------------------------------------------------------

# "GPU" label — yellow text
Widget GPU_Label_TTF {
    class 'Truetype'
    expression 'GPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffe400'
    size 22
    align 'C'
    width 130
    height 26
    update 0
}

# GPU percentage — white, large, with % symbol
Widget GPU_Pct_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('system', 500), 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 32
    align 'C'
    width 145
    height 40
    reload 1
    update tick
}

# GPU bar — yellow
# GPU_PctBar border — ffe400 outline
Widget GPU_PctBar_Border {
    class 'graphicbar'
    expression 100
    color 'ffe400'
    background '000000'
    style 'H'
    max 100
    length 105
    width 20
    direction 'E'
    update 0
}

Widget GPU_PctBar {
    class 'graphicbar'
    expression proc_stat::cpu('system', 500)
    color 'ffe400'
    colorhigh 'ffe400'
    colorlow 'ffe400'
    background '000000'
    max 100
    length 103
    width 18
    direction 'E'
    update tack
}

# GPU info — white, small (showing load average as proxy)
Widget GPU_Freq_TTF {
    class 'Truetype'
    expression 'LOAD '  . precision(loadavg(1), 2)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 12
    align 'C'
    width 105
    height 16
    reload 1
    update tick
}

# ---------------------------------------------------------------
# Zone 3: CPU % Gauge (center circle)
# The background provides the yellow circle; we overlay big text.
# lcd4linux has no radial gauge widget, so we show the percentage
# as large centered black text on the yellow circle.
# ---------------------------------------------------------------

# Big CPU percentage — black text on yellow circle
Widget CPU_Pct_Big_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    background '00000000'
    size 50
    align 'C'
    width 190
    height 60
    reload 1
    update tick
}
Widget CPU_Gauge {
    class 'Gauge'
    expression proc_stat::cpu('busy', 500)
    width 190
    height 190
    min 0
    max 100
    start 180
    sweep 360
    thickness 0
    color 'ffee88'
    background 'ffe400'
    update tack
    direction 'CCW'
}

# ---------------------------------------------------------------
# Zone 4: RAM Info (bottom-left box, ~theme X:0-155, Y:335-480)
# Shows: "RAM" label, percentage, bar, used/free details
# ---------------------------------------------------------------

# "RAM" label — yellow text
Widget RAM_Label_TTF {
    class 'Truetype'
    expression 'RAM'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffe400'
    size 22
    align 'C'
    width 130
    height 26
    update 0
}

# RAM percentage — white, large, with % symbol
Widget RAM_Pct_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100, 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 32
    align 'C'
    width 150
    height 40
    reload 1
    update tick
}

# RAM bar — yellow
# RAM_Bar border — ffe400 outline
Widget RAM_Bar_Border {
    class 'graphicbar'
    expression 100
    color 'ffe400'
    background '000000'
    style 'H'
    max 100
    length 105
    width 20
    direction 'E'
    update 0
}

Widget RAM_Bar {
    class 'graphicbar'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    color 'ffe400'
    colorhigh 'ffe400'
    colorlow 'ffe400'
    background '000000'
    max 100
    length 103
    width 18
    direction 'E'
    update tack
}

# "USED" label — yellow, small
Widget RAM_Used_Label_TTF {
    class 'Truetype'
    expression 'USED'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffe400'
    size 10
    align 'L'
    width 38
    height 13
    update 0
}

# RAM used value — white, small
Widget RAM_Used_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / 1024, 0).' M'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 11
    align 'L'
    width 95
    height 14
    reload 1
    update tick
}

# "FREE" label — yellow, small
Widget RAM_Free_Label_TTF {
    class 'Truetype'
    expression 'FREE'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffe400'
    size 10
    align 'L'
    width 38
    height 13
    update 0
}

# RAM free value — white, small
Widget RAM_Free_TTF {
    class 'Truetype'
    expression precision(meminfo('MemAvailable') / 1024, 0).' M'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 11
    align 'L'
    width 95
    height 14
    reload 1
    update tick
}

# ---------------------------------------------------------------
# Zone 5: SSD/NET Info (bottom-right box, ~theme X:165-320, Y:335-480)
# Shows: "SSD/NET" label, disk %, network upload/download speeds
# ---------------------------------------------------------------

# "SSD/NET" label — yellow text
Widget DISK_Label_TTF {
    class 'Truetype'
    expression 'SSD/NET'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffe400'
    size 22
    align 'C'
    width 140
    height 26
    update 0
}

# Disk usage percentage — white, large, with % symbol
Widget DISK_Pct_TTF {
    class 'Truetype'
    expression precision((1 - 1.0 * statfs('/', 'bavail') / statfs('/', 'blocks')) * 100, 0).'%'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 32
    align 'C'
    width 145
    height 40
    reload 1
    update 10000
}

# Network upload speed — yellow
Widget NET_Upload_TTF {
    class 'Truetype'
    expression precision(netdev('eno1', 'Tx_bytes', 500) / 1048576, 1).' M/S'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffe400'
    size 16
    align 'L'
    width 145
    height 20
    reload 1
    update tick
}

# Network download speed — yellow
Widget NET_Download_TTF {
    class 'Truetype'
    expression precision(netdev('eno1', 'Rx_bytes', 500) / 1048576, 1).' M/S'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffe400'
    size 16
    align 'L'
    width 145
    height 20
    reload 1
    update tick
}

# ---------------------------------------------------------------
Display 'DPF'

Layout layout_yellowgauge {
    # Layer 1: Foreground — all widgets (lower index = on top)
    #
    # Coordinate mapping: X = row (vertical), Y = col (horizontal)
    # Theme (horiz, vert) -> Layout X{vert+1}.Y{horiz+1}
    Layer 0 {
        # --- Zone 3: CPU % text overlay (transparent bg over gauge) ---
        X206.Y71    'CPU_Pct_Big_TTF'
    }
    Layer 1 {
        # --- Zone 1: CPU Info (top-left box) ---
        X11.Y11     'CPU_Label_TTF'
        X46.Y1      'CPU_Temp_TTF'
        X91.Y29 'CPU_TempBar_Border'

        X92.Y30 'CPU_TempBar'
        X121.Y39    'CPU_Freq_TTF'

        # --- Zone 2: GPU Info (top-right box) ---
        X11.Y181    'GPU_Label_TTF'
        X46.Y176    'GPU_Pct_TTF'
        X91.Y191 'GPU_PctBar_Border'

        X92.Y192 'GPU_PctBar'
        X121.Y201   'GPU_Freq_TTF'

        # --- Zone 3: CPU % Gauge (center) ---
        X146.Y70    'CPU_Gauge'

        # --- Zone 4: RAM Info (bottom-left box) ---
        X351.Y11    'RAM_Label_TTF'
        X381.Y11    'RAM_Pct_TTF'
        X421.Y29 'RAM_Bar_Border'

        X422.Y30 'RAM_Bar'
        X447.Y28    'RAM_Used_Label_TTF'
        X446.Y66    'RAM_Used_TTF'
        X463.Y28    'RAM_Free_Label_TTF'
        X461.Y66    'RAM_Free_TTF'

        # --- Zone 5: SSD/NET Info (bottom-right box) ---
        X351.Y181   'DISK_Label_TTF'
        X381.Y176   'DISK_Pct_TTF'
        X431.Y176   'NET_Upload_TTF'
        X456.Y176   'NET_Download_TTF'
    }

    # Layer 2: Background image (higher index = behind)
    Layer 2 {
        X1.Y1 'Background'
    }
}

Layout 'layout_yellowgauge'

Variables {
    backlight 7
    tick 1000
    tack 500
}
