# Theme design: @takattila (turing-smart-screen-python)
# lcd4linux config: @amd989
# FreeBSD adaptation
# License: GPL-3.0 (https://github.com/mathoudebine/turing-smart-screen-python)
#
# FreeBSD version of SimpleWhite theme.
# Differences from Linux version:
#   - cpuinfo() uses sysctl OIDs instead of /proc/cpuinfo keys
#   - exec() calls use sysctl instead of /sys/class/thermal
#   - lspci works on FreeBSD (install pciutils package)
#
Display dpf {
    Driver     'DPF'
    Port       'usb0'
    Font       '6x8'
    Foreground 'ffffff'
    Background '000000'
    Basecolor  '000000'
    Orientation 1
    Backlight  backlight
}

# ---------------------------------------------------------------
# SimpleWhite-FreeBSD theme - 320x480 portrait
# 4 sections: CPU%, RAM%, GPU%, CPU Temp
# ---------------------------------------------------------------

# Background image (reuses SimpleWhite background)
Widget Background {
    class 'Image'
    file 'themes/SimpleWhite-FreeBSD/background.png'
    reload 0
    update 0
    visible 1
}

# ---------------------------------------------------------------
# Section 1: CPU Percentage (rows 0-119)
# ---------------------------------------------------------------

Widget CPU_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('busy', 500), 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update tick
}

Widget CPU_Label_TTF {
    class 'Truetype'
    expression '%  CPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}

# FreeBSD: cpuinfo() uses sysctl OIDs — 'hw.model' instead of 'model name'
Widget CPU_Model_TTF {
    class 'Truetype'
    expression cpuinfo('hw.model')
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 10
    align 'L'
    width 150
    height 16
    update 0
}

Widget CPU_GBar_Border {
    class 'graphicbar'
    expression 100
    color '000000'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget CPU_GBar {
    class 'graphicbar'
    expression proc_stat::cpu('busy', 500)
    color 'ffffff'
    colorhigh 'ffffff'
    colorlow 'ffffff'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update tack
}

# ---------------------------------------------------------------
# Section 2: RAM Percentage (rows 120-239)
# ---------------------------------------------------------------

Widget RAM_TTF {
    class 'Truetype'
    expression precision((meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100, 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update tick
}

Widget RAM_Label_TTF {
    class 'Truetype'
    expression '%  RAM'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}

Widget RAM_Model_TTF {
    class 'Truetype'
    expression precision(meminfo('MemTotal')/1024, 0).' MB'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 10
    align 'L'
    width 150
    height 16
    update 0
}

Widget RAM_GBar_Border {
    class 'graphicbar'
    expression 100
    color '000000'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget RAM_GBar {
    class 'graphicbar'
    expression (meminfo('MemTotal') - meminfo('MemAvailable')) / meminfo('MemTotal') * 100
    color 'ffffff'
    colorhigh 'ffffff'
    colorlow 'ffffff'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update tack
}

# ---------------------------------------------------------------
# Section 3: GPU / System Load (rows 240-359)
# ---------------------------------------------------------------

Widget GPU_TTF {
    class 'Truetype'
    expression precision(proc_stat::cpu('system', 500), 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update tick
}

Widget GPU_Label_TTF {
    class 'Truetype'
    expression '%  GPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}

# FreeBSD: lspci works if pciutils is installed
Widget GPU_Model_TTF {
    class 'Truetype'
    expression exec('/usr/local/bin/lspci 2>/dev/null | grep -i vga | sed "s/.*: //"', 60000)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 10
    align 'L'
    width 150
    height 16
    reload 1
    update 5000
}

Widget GPU_GBar_Border {
    class 'graphicbar'
    expression 100
    color '000000'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget GPU_GBar {
    class 'graphicbar'
    expression proc_stat::cpu('system', 500)
    color 'ffffff'
    colorhigh 'ffffff'
    colorlow 'ffffff'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update tack
}

# ---------------------------------------------------------------
# Section 4: CPU Temperature (rows 360-479)
# FreeBSD: use sysctl dev.cpu.0.temperature (coretemp driver)
#   Output format: "45.0C" — extract with sed
# ---------------------------------------------------------------

Widget TEMP_TTF {
    class 'Truetype'
    expression precision(exec('sysctl -n dev.cpu.0.temperature 2>/dev/null | sed "s/C$//"', 10000), 0)
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor 'ffffff'
    size 72
    align 'R'
    width 155
    height 100
    reload 1
    update 5000
}

Widget TEMP_Label_TTF {
    class 'Truetype'
    expression '°C CPU'
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 28
    align 'L'
    width 150
    height 38
    update 0
}

Widget TEMP_Model_TTF {
    class 'Truetype'
    expression cpuinfo('hw.model')
    font 'fonts/generale-mono/GeneraleMonoA.ttf'
    fcolor '000000'
    size 10
    align 'L'
    width 150
    height 16
    update 0
}

Widget TEMP_GBar_Border {
    class 'graphicbar'
    expression 100
    color '000000'
    background '000000'
    style 'H'
    max 100
    length 140
    width 50
    direction 'E'
    update 0
}

Widget TEMP_GBar {
    class 'graphicbar'
    expression exec('sysctl -n dev.cpu.0.temperature 2>/dev/null | sed "s/C$//"', 10000)
    color 'ffffff'
    colorhigh 'ffffff'
    colorlow 'ffffff'
    background '000000'
    max 100
    length 138
    width 48
    direction 'E'
    update 5000
}

# ---------------------------------------------------------------
Display 'DPF'

Layout layout_simplewhite {
    Layer 1 {
        # --- Section 1: CPU % (rows 0-119) ---
        X16.Y6     'CPU_TTF'
        X11.Y171   'CPU_Label_TTF'
        X47.Y171   'CPU_Model_TTF'
        X65.Y171 'CPU_GBar_Border'

        X66.Y172 'CPU_GBar'

        # --- Section 2: RAM % (rows 120-239) ---
        X131.Y6    'RAM_TTF'
        X126.Y171  'RAM_Label_TTF'
        X165.Y171  'RAM_Model_TTF'
        X183.Y171 'RAM_GBar_Border'

        X184.Y172 'RAM_GBar'

        # --- Section 3: GPU % (rows 240-359) ---
        X251.Y6    'GPU_TTF'
        X246.Y171  'GPU_Label_TTF'
        X283.Y171  'GPU_Model_TTF'
        X301.Y171 'GPU_GBar_Border'

        X302.Y172 'GPU_GBar'

        # --- Section 4: CPU Temp (rows 360-479) ---
        X371.Y6    'TEMP_TTF'
        X363.Y169  'TEMP_Label_TTF'
        X403.Y171  'TEMP_Model_TTF'
        X421.Y171 'TEMP_GBar_Border'

        X422.Y172 'TEMP_GBar'
    }

    Layer 2 {
        X1.Y1 'Background'
    }
}

Layout 'layout_simplewhite'

Variables {
    backlight 7
    tick 1000
    tack 500
}
