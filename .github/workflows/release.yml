name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            docker_platform: linux/amd64
          - arch: arm64
            docker_platform: linux/arm64
          - arch: armhf
            docker_platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "$PWD":/build -w /build \
            debian:bookworm bash -c '
              set -e
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential debhelper autoconf automake libtool libtool-bin pkg-config \
                libusb-1.0-0-dev libgd-dev libvncserver-dev \
                libx11-dev libxext-dev libxpm-dev \
                libmosquitto-dev \
                git
              # Update changelog version from tag
              sed -i "1s/([^)]*)/('"${{ steps.version.outputs.version }}"'-1)/" debian/changelog
              dpkg-buildpackage -us -uc -b
              mkdir -p output
              mv ../*.deb output/
            '

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: output/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            docker_platform: linux/amd64
          - arch: aarch64
            docker_platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .rpm package
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "$PWD":/build -w /build \
            rockylinux:9 bash -c '
              set -e
              dnf install -y epel-release
              dnf config-manager --set-enabled crb
              dnf install -y gcc make autoconf automake libtool pkgconfig \
                libusbx-devel gd-devel libvncserver-devel \
                libX11-devel libXext-devel libXpm-devel \
                mosquitto-devel \
                rpm-build git systemd-rpm-macros gettext-devel
              VERSION='"${{ steps.version.outputs.version }}"'
              # RPM Version field forbids "-"; replace with "." (sorts lower, correct for pre-releases)
              RPM_VERSION=$(echo "$VERSION" | tr - .)
              # Create source tarball
              mkdir -p /root/rpmbuild/{SOURCES,SPECS}
              tar czf /root/rpmbuild/SOURCES/lcd4linux-ax206-${RPM_VERSION}.tar.gz \
                --transform "s,^\.,lcd4linux-ax206-${RPM_VERSION}," \
                --exclude=.git .
              cp rpm/lcd4linux-ax206.spec /root/rpmbuild/SPECS/
              rpmbuild -bb --define "_version ${RPM_VERSION}" /root/rpmbuild/SPECS/lcd4linux-ax206.spec
              mkdir -p /build/output
              cp /root/rpmbuild/RPMS/*/*.rpm /build/output/
            '

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: output/*.rpm

  build-themeeditor:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive_ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive_ext: tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            archive_ext: tar.gz
          - os: macos-14
            rid: osx-x64
            archive_ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ThemeEditor/ThemeEditor.csproj -r ${{ matrix.rid }}

      - name: Publish self-contained single-file
        shell: bash
        run: |
          dotnet publish ThemeEditor/ThemeEditor.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            --no-restore \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:Version=${{ steps.version.outputs.version }} \
            -o publish

      - name: Package (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null
          $name = "ThemeEditor-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip"
          Compress-Archive -Path publish/* -DestinationPath "output/$name"

      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          mkdir -p output
          name="ThemeEditor-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz"
          tar -czf "output/$name" -C publish .

      - name: Upload ThemeEditor artifact
        uses: actions/upload-artifact@v4
        with:
          name: themeeditor-${{ matrix.rid }}
          path: output/*

  build-freebsd:
    runs-on: [self-hosted, freebsd]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build lcd4linux
        run: |
          ./bootstrap
          ./configure --with-drivers=DPF,VNC,X11
          make clean
          make
          ./lcd4linux -l

      - name: Build FreeBSD .pkg
        run: |
          chmod +x pkg/freebsd/build-pkg.sh
          sh pkg/freebsd/build-pkg.sh "${{ steps.version.outputs.version }}"

      - name: Upload pkg
        uses: actions/upload-artifact@v4
        with:
          name: pkg-freebsd-amd64
          path: dist/*.pkg

      - name: Build FreeBSD pkg repo
        run: |
          mkdir -p repo/freebsd
          cp dist/*.pkg repo/freebsd/
          pkg repo repo/freebsd/

      - name: Upload pkg repo
        uses: actions/upload-artifact@v4
        with:
          name: pkg-repo-freebsd
          path: repo/freebsd/

      - name: Clean up
        if: always()
        run: |
          make distclean 2>/dev/null || true
          rm -rf dist repo

  release:
    needs: [build, build-rpm, build-freebsd, build-themeeditor]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*.deb
            packages/*.rpm
            packages/*.pkg
            packages/ThemeEditor-*.zip
            packages/ThemeEditor-*.tar.gz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-repos:
    needs: [build, build-rpm, build-freebsd]
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Initialize gh-pages if needed
        run: |
          if [ ! -f index.html ]; then
            git init
            git checkout -b gh-pages
          fi

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          path: incoming-deb
          merge-multiple: true

      - name: Download rpm artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rpm-*
          path: incoming-rpm
          merge-multiple: true

      - name: Download FreeBSD pkg repo
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-repo-freebsd
          path: incoming-pkg
          merge-multiple: true

      - name: Install repo tools
        run: sudo apt-get update && sudo apt-get install -y reprepro createrepo-c

      - name: Import or generate GPG key
        run: |
          if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
            GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          else
            # Generate a temporary key for signing (user should replace with proper key)
            cat > /tmp/gpg-batch <<GPGEOF
              %no-protection
              Key-Type: RSA
              Key-Length: 4096
              Subkey-Type: RSA
              Subkey-Length: 4096
              Name-Real: lcd4linux-ax206
              Name-Email: amd989@users.noreply.github.com
              Expire-Date: 0
          GPGEOF
            gpg --batch --gen-key /tmp/gpg-batch
            GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
            echo "::warning::Using auto-generated GPG key. For production, add GPG_PRIVATE_KEY secret."
          fi
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
          gpg --armor --export "$GPG_KEY_ID" > gpg.key

      - name: Configure reprepro
        run: |
          mkdir -p conf
          cat > conf/distributions <<EOF
          Origin: lcd4linux-ax206
          Label: lcd4linux-ax206
          Codename: stable
          Architectures: amd64 arm64 armhf
          Components: main
          Description: LCD4Linux for AX206 USB displays
          SignWith: ${{ env.GPG_KEY_ID }}
          EOF

      - name: Add deb packages to APT repo
        run: |
          for deb in incoming-deb/*.deb; do
            reprepro includedeb stable "$deb"
          done

      - name: Create YUM/DNF repo
        run: |
          rm -rf rpm/packages rpm/repodata
          mkdir -p rpm/packages
          cp incoming-rpm/*.rpm rpm/packages/
          gpg --batch --pinentry-mode loopback --detach-sign --armor rpm/packages/*.rpm 2>/dev/null || true
          createrepo_c rpm/
          gpg --batch --pinentry-mode loopback --detach-sign --armor rpm/repodata/repomd.xml

      - name: Fetch index page from source
        run: |
          curl -fsSL "https://raw.githubusercontent.com/amd989/lcd4linux-ax206/${GITHUB_REF_NAME}/gh-pages/index.html" -o index.html
          sed -i "s/{{VERSION}}/${GITHUB_REF_NAME#v}/g" index.html

      - name: Create APT setup script
        run: |
          cat > setup-apt.sh <<'EOF'
          #!/bin/bash
          set -e
          echo "Adding lcd4linux-ax206 APT repository..."
          curl -fsSL https://amd989.github.io/lcd4linux-ax206/gpg.key | gpg --dearmor -o /usr/share/keyrings/lcd4linux-ax206.gpg
          echo "deb [signed-by=/usr/share/keyrings/lcd4linux-ax206.gpg] https://amd989.github.io/lcd4linux-ax206 stable main" > /etc/apt/sources.list.d/lcd4linux-ax206.list
          apt-get update
          echo "Done! Run: sudo apt install lcd4linux-ax206"
          EOF
          chmod +x setup-apt.sh

      - name: Create DNF setup script
        run: |
          cat > setup-rpm.sh <<'EOF'
          #!/bin/bash
          set -e
          echo "Adding lcd4linux-ax206 YUM/DNF repository..."
          rpm --import https://amd989.github.io/lcd4linux-ax206/gpg.key
          cat > /etc/yum.repos.d/lcd4linux-ax206.repo <<REPOEOF
          [lcd4linux-ax206]
          name=lcd4linux-ax206
          baseurl=https://amd989.github.io/lcd4linux-ax206/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://amd989.github.io/lcd4linux-ax206/gpg.key
          REPOEOF
          echo "Done! Run: sudo dnf install lcd4linux-ax206"
          EOF
          chmod +x setup-rpm.sh

      - name: Stage FreeBSD pkg repo
        run: |
          mkdir -p freebsd
          cp incoming-pkg/* freebsd/ 2>/dev/null || true

      - name: Create FreeBSD pkg setup script
        run: |
          cat > setup-pkg.sh <<'EOF'
          #!/bin/sh
          set -e
          echo "Adding lcd4linux-ax206 FreeBSD pkg repository..."
          mkdir -p /usr/local/etc/pkg/repos
          cat > /usr/local/etc/pkg/repos/lcd4linux-ax206.conf <<REPOEOF
          lcd4linux-ax206: {
            url: "https://amd989.github.io/lcd4linux-ax206/freebsd",
            enabled: yes,
            signature_type: "none"
          }
          REPOEOF
          pkg update
          echo "Done! Run: pkg install lcd4linux-ax206"
          EOF
          chmod +x setup-pkg.sh

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Clean up build artifacts, keep repo files
          rm -rf incoming-deb incoming-rpm incoming-pkg conf
          git add -A
          git commit -m "Update repos for ${GITHUB_REF_NAME}" || true
          git push origin gh-pages --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
