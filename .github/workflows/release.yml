name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            docker_platform: linux/amd64
          - arch: arm64
            docker_platform: linux/arm64
          - arch: armhf
            docker_platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "$PWD":/build -w /build \
            debian:bookworm bash -c '
              set -e
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential debhelper autoconf automake libtool libtool-bin pkg-config \
                libusb-1.0-0-dev libgd-dev libvncserver-dev \
                libx11-dev libxext-dev libxpm-dev \
                git
              # Update changelog version from tag
              sed -i "1s/([^)]*)/('"${{ steps.version.outputs.version }}"'-1)/" debian/changelog
              dpkg-buildpackage -us -uc -b
              mkdir -p output
              mv ../*.deb output/
            '

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: output/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            docker_platform: linux/amd64
          - arch: aarch64
            docker_platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .rpm package
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "$PWD":/build -w /build \
            rockylinux:9 bash -c '
              set -e
              dnf install -y epel-release
              dnf config-manager --set-enabled crb
              dnf install -y gcc make autoconf automake libtool pkgconfig \
                libusbx-devel gd-devel libvncserver-devel \
                libX11-devel libXext-devel libXpm-devel \
                rpm-build git systemd-rpm-macros gettext-devel
              VERSION='"${{ steps.version.outputs.version }}"'
              # Create source tarball
              mkdir -p /root/rpmbuild/{SOURCES,SPECS}
              tar czf /root/rpmbuild/SOURCES/lcd4linux-ax206-${VERSION}.tar.gz \
                --transform "s,^\.,lcd4linux-ax206-${VERSION}," \
                --exclude=.git .
              cp rpm/lcd4linux-ax206.spec /root/rpmbuild/SPECS/
              rpmbuild -bb --define "_version ${VERSION}" /root/rpmbuild/SPECS/lcd4linux-ax206.spec
              mkdir -p /build/output
              cp /root/rpmbuild/RPMS/*/*.rpm /build/output/
            '

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: output/*.rpm

  release:
    needs: [build, build-rpm]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*.deb
            packages/*.rpm
          generate_release_notes: true

  publish-repos:
    needs: [build, build-rpm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Initialize gh-pages if needed
        run: |
          if [ ! -f index.html ]; then
            git init
            git checkout -b gh-pages
          fi

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          path: incoming-deb
          merge-multiple: true

      - name: Download rpm artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rpm-*
          path: incoming-rpm
          merge-multiple: true

      - name: Install repo tools
        run: sudo apt-get update && sudo apt-get install -y reprepro createrepo-c

      - name: Import or generate GPG key
        run: |
          if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
            GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          else
            # Generate a temporary key for signing (user should replace with proper key)
            cat > /tmp/gpg-batch <<GPGEOF
              %no-protection
              Key-Type: RSA
              Key-Length: 4096
              Subkey-Type: RSA
              Subkey-Length: 4096
              Name-Real: lcd4linux-ax206
              Name-Email: amd989@users.noreply.github.com
              Expire-Date: 0
          GPGEOF
            gpg --batch --gen-key /tmp/gpg-batch
            GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
            echo "::warning::Using auto-generated GPG key. For production, add GPG_PRIVATE_KEY secret."
          fi
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
          gpg --armor --export "$GPG_KEY_ID" > gpg.key

      - name: Configure reprepro
        run: |
          mkdir -p conf
          cat > conf/distributions <<EOF
          Origin: lcd4linux-ax206
          Label: lcd4linux-ax206
          Codename: stable
          Architectures: amd64 arm64 armhf
          Components: main
          Description: LCD4Linux for AX206 USB displays
          SignWith: ${{ env.GPG_KEY_ID }}
          EOF

      - name: Add deb packages to APT repo
        run: |
          for deb in incoming-deb/*.deb; do
            reprepro includedeb stable "$deb"
          done

      - name: Create YUM/DNF repo
        run: |
          rm -rf rpm/packages rpm/repodata
          mkdir -p rpm/packages
          cp incoming-rpm/*.rpm rpm/packages/
          gpg --batch --pinentry-mode loopback --detach-sign --armor rpm/packages/*.rpm 2>/dev/null || true
          createrepo_c rpm/
          gpg --batch --pinentry-mode loopback --detach-sign --armor rpm/repodata/repomd.xml

      - name: Create index page
        run: |
          cat > index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head><title>lcd4linux-ax206 Package Repository</title></head>
          <body>
          <h1>lcd4linux-ax206 Package Repository</h1>

          <h2>Debian / Ubuntu / Mint (apt)</h2>
          <h3>Quick Install</h3>
          <pre>
          curl -fsSL https://amd989.github.io/lcd4linux-ax206/setup.sh | sudo bash
          sudo apt install lcd4linux-ax206
          </pre>
          <h3>Manual Setup</h3>
          <pre>
          curl -fsSL https://amd989.github.io/lcd4linux-ax206/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/lcd4linux-ax206.gpg
          echo "deb [signed-by=/usr/share/keyrings/lcd4linux-ax206.gpg] https://amd989.github.io/lcd4linux-ax206 stable main" | sudo tee /etc/apt/sources.list.d/lcd4linux-ax206.list
          sudo apt update
          sudo apt install lcd4linux-ax206
          </pre>

          <h2>Rocky Linux / RHEL / Fedora (dnf)</h2>
          <h3>Quick Install</h3>
          <pre>
          curl -fsSL https://amd989.github.io/lcd4linux-ax206/setup-rpm.sh | sudo bash
          sudo dnf install lcd4linux-ax206
          </pre>
          <h3>Manual Setup</h3>
          <pre>
          sudo rpm --import https://amd989.github.io/lcd4linux-ax206/gpg.key
          sudo tee /etc/yum.repos.d/lcd4linux-ax206.repo &lt;&lt;EOF
          [lcd4linux-ax206]
          name=lcd4linux-ax206
          baseurl=https://amd989.github.io/lcd4linux-ax206/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://amd989.github.io/lcd4linux-ax206/gpg.key
          EOF
          sudo dnf install lcd4linux-ax206
          </pre>
          </body>
          </html>
          HTMLEOF

      - name: Create APT setup script
        run: |
          cat > setup.sh <<'SETUPEOF'
          #!/bin/bash
          set -e
          echo "Adding lcd4linux-ax206 APT repository..."
          curl -fsSL https://amd989.github.io/lcd4linux-ax206/gpg.key | gpg --dearmor -o /usr/share/keyrings/lcd4linux-ax206.gpg
          echo "deb [signed-by=/usr/share/keyrings/lcd4linux-ax206.gpg] https://amd989.github.io/lcd4linux-ax206 stable main" > /etc/apt/sources.list.d/lcd4linux-ax206.list
          apt-get update
          echo "Done! You can now run: sudo apt install lcd4linux-ax206"
          SETUPEOF
          chmod +x setup.sh

      - name: Create DNF setup script
        run: |
          cat > setup-rpm.sh <<'SETUPEOF'
          #!/bin/bash
          set -e
          echo "Adding lcd4linux-ax206 YUM/DNF repository..."
          rpm --import https://amd989.github.io/lcd4linux-ax206/gpg.key
          cat > /etc/yum.repos.d/lcd4linux-ax206.repo <<REPOEOF
          [lcd4linux-ax206]
          name=lcd4linux-ax206
          baseurl=https://amd989.github.io/lcd4linux-ax206/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://amd989.github.io/lcd4linux-ax206/gpg.key
          REPOEOF
          echo "Done! You can now run: sudo dnf install lcd4linux-ax206"
          SETUPEOF
          chmod +x setup-rpm.sh

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Clean up build artifacts, keep repo files
          rm -rf incoming-deb incoming-rpm conf
          git add -A
          git commit -m "Update APT repo for ${GITHUB_REF_NAME}" || true
          git push origin gh-pages --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
